name: qtai_app
description: "큐티 AI 앱"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 네트워크
  dio: ^5.7.0

  # 보안 저장소
  flutter_secure_storage: ^9.2.4

  # 로컬 저장소
  shared_preferences: ^2.3.4

  # 카카오 로그인
  kakao_flutter_sdk_user: ^1.9.5

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
