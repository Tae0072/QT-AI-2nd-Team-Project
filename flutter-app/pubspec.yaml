name: qtai_app
description: "큐티 AI 앱"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # 국제화(다국어)
  flutter_localizations:
    sdk: flutter
  intl: any

  # 상태 관리
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # 네트워크
  dio: ^5.7.0

  # 보안 저장소
  flutter_secure_storage: ^9.2.4

  # 로컬 저장소
  shared_preferences: ^2.3.4

  # 카카오 로그인
  kakao_flutter_sdk_user: ^1.9.5

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  table_calendar: ^3.2.0
  share_plus: ^12.0.2
  path_provider: ^2.1.5

  # TTS 오디오 재생
  just_audio: ^0.9.42
  video_player: ^2.9.2
  # (path_provider는 위 공유 기능과 공용 — 중복 선언 제거)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.4
  build_runner: ^2.15.0
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
