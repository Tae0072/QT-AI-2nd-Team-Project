name: qtai_app
description: "QT-AI — 성경 묵상 AI 코칭 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0

  # SSE (AI 대화 스트리밍 수신)
  flutter_client_sse: ^2.0.3

  # WebSocket / STOMP (알림)
  stomp_dart_client: ^2.0.0

  # Routing
  go_router: ^14.6.1

  # Storage (JWT, refresh 토큰)
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
