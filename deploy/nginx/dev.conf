# =============================================================================
# QT-AI dev 게이트웨이 (인프라 nginx) — 클라이언트 단일 진입점 :8080
# =============================================================================
# - 금지된 service-gateway "모듈"의 부활이 아니다. 애플리케이션 코드가 없는
#   인프라 nginx 컨테이너다(CLAUDE.md §8 로컬 K8s/Helm 예외와 동일한 톤의
#   로컬 배포 한정 인프라). 근거: 코드리뷰 2026-06-10 결정 B.
# - flutter-app(전 기능 :8080/api/v1)과 admin-web이 이 진입점 하나만 바라본다.
# - 경로 매핑은 각 서비스 컨트롤러 @RequestMapping 전수 대조로 확정(2026-06-11).
# - nginx prefix location은 "가장 긴 접두사"가 이긴다.
#   예: /api/v1/me/praise-songs 가 /api/v1/me 보다 우선 매칭.
# - 서비스 간 내부 호출은 컨테이너 네트워크 직통이라 이 게이트웨이를 타지 않는다.

server {
    listen 8080;
    server_name _;

    # 게이트웨이 자체 헬스체크(백엔드 무관) — compose/k8s probe 용
    location = /healthz { return 200 "ok"; }

    # ---- 외부 차단: 서비스 간 내부(SYSTEM_BATCH) API — 이중 방어 ----
    # 1차 방어는 앱 레벨 @PreAuthorize(hasRole('SYSTEM_BATCH')). 게이트웨이에서도 차단한다.
    location /api/v1/system/                  { return 403; }
    location /api/v1/study/verse-explanations { return 403; }
    location /api/v1/notes/purge              { return 403; }
    location /api/v1/reports/purge            { return 403; }
    location /api/v1/sharing/purge            { return 403; }
    location /api/v1/praise-songs/purge       { return 403; }

    # ---- 관리자 ----
    # admin/auth(카카오 로그인)는 JWT 발급 주체인 service-user 소관(2026-06-10 팀 결정).
    # 그 외 /admin/** 은 admin-server(모놀리식 복사본, admin-web 호환 유지).
    location /api/v1/admin/auth/ { proxy_pass http://service-user:8081; }
    location /api/v1/admin/      { proxy_pass http://service-admin:8090; }

    # ---- service-user (8081): 인증·회원·알림 ----
    location /api/v1/auth/         { proxy_pass http://service-user:8081; }
    location /api/v1/members       { proxy_pass http://service-user:8081; }
    location /api/v1/notifications { proxy_pass http://service-user:8081; }
    location /api/v1/me            { proxy_pass http://service-user:8081; }

    # ---- /me 하위 예외: 데이터를 소유한 도메인 서비스로 ----
    location /api/v1/me/praise-songs        { proxy_pass http://service-bible:8082; }
    location /api/v1/me/sharing-posts       { proxy_pass http://service-note:8083; }
    location /api/v1/me/bookmarks           { proxy_pass http://service-note:8083; }
    location /api/v1/me/mentions            { proxy_pass http://service-note:8083; }
    location /api/v1/me/meditation-calendar { proxy_pass http://service-note:8083; }

    # ---- service-bible (8082): 읽기전용 콘텐츠 ----
    location /api/v1/bible        { proxy_pass http://service-bible:8082; }
    location /api/v1/qt           { proxy_pass http://service-bible:8082; }
    location /api/v1/study        { proxy_pass http://service-bible:8082; }
    location /api/v1/music        { proxy_pass http://service-bible:8082; }
    location /api/v1/praise-songs { proxy_pass http://service-bible:8082; }

    # ---- service-note (8083): 노트·나눔·댓글·신고 ----
    location /api/v1/notes           { proxy_pass http://service-note:8083; }
    location /api/v1/note-categories { proxy_pass http://service-note:8083; }
    location /api/v1/sharing         { proxy_pass http://service-note:8083; }
    location /api/v1/sharing-posts   { proxy_pass http://service-note:8083; }
    location /api/v1/comments        { proxy_pass http://service-note:8083; }
    location /api/v1/reports         { proxy_pass http://service-note:8083; }

    # ---- service-ai (8084): F-15 단발 Q&A 등 사용자 AI ----
    location /api/v1/ai/ { proxy_pass http://service-ai:8084; }

    # 매핑 밖 경로는 404 — 신규 컨트롤러 추가 시 이 파일에 경로를 등록해야 한다.
    location / { return 404; }
}
