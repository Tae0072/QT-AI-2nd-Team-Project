# QT-AI Local Infrastructure
#
# 사용:
#   cd infra
#   docker compose up -d                          # 핵심 인프라만
#   docker compose --profile observability up -d   # + Jaeger/Prometheus/Grafana
#
# 포트 (DECISIONS.md 기준):
#   mysql            :3306
#   redis-cache      :6379  (Bible Service 캐시)
#   redis-ws         :6380  (Auth + BFF 세션)
#   kafka            :9092  (KRaft 모드, ZooKeeper 미사용)
#   schema-registry  :8086  (Apicurio)
#   chromadb         :8000
#   jaeger UI        :16686
#   jaeger OTLP      :4318
#   prometheus       :9090  (observability profile)
#   grafana          :3000  (observability profile)

name: qtai

services:
  # =============================================================================
  # MySQL 8.0 (DECISIONS.md 기준 RDBMS)
  # =============================================================================
  mysql:
    image: mysql:8.0
    container_name: qtai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qtai}
      MYSQL_USER: ${MYSQL_USERNAME:-qtai_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_local}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # =============================================================================
  # Redis x 2 (DECISIONS.md 기준)
  # =============================================================================
  redis-cache:
    image: redis:7-alpine
    container_name: qtai-redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-cache-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  redis-ws:
    image: redis:7-alpine
    container_name: qtai-redis-ws
    restart: unless-stopped
    ports:
      - "6380:6379"  # 호스트 6380 → 컨테이너 내부 6379
    volumes:
      - redis-ws-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # =============================================================================
  # Kafka KRaft 단일 노드 (DECISIONS.md 기준)
  # =============================================================================
  kafka:
    image: apache/kafka:3.8.0
    container_name: qtai-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data

  # =============================================================================
  # Apicurio Schema Registry (호스트 포트 8086, DECISIONS.md 기준)
  # =============================================================================
  schema-registry:
    image: apicurio/apicurio-registry-mem:2.5.11.Final
    container_name: qtai-schema-registry
    restart: unless-stopped
    ports:
      - "8086:8080"
    depends_on:
      - kafka

  # =============================================================================
  # ChromaDB (AI Service Vector Store)
  # =============================================================================
  chromadb:
    image: chromadb/chroma:0.5.18
    container_name: qtai-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma

  # =============================================================================
  # Observability Stack (선택적)
  # 실행: docker compose --profile observability up -d
  # =============================================================================

  # Jaeger (DECISIONS.md 기준 — Tempo 미사용)
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: qtai-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # UI
      - "4318:4318"    # OTLP HTTP
      - "4317:4317"    # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - observability

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: qtai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
    profiles:
      - observability

  grafana:
    image: grafana/grafana:11.3.0
    container_name: qtai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    profiles:
      - observability

  # Loki (로그 집계)
  loki:
    image: grafana/loki:3.2.0
    container_name: qtai-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    profiles:
      - observability

volumes:
  mysql-data:
  redis-cache-data:
  redis-ws-data:
  kafka-data:
  chromadb-data:
  prometheus-data:
  grafana-data:
  loki-data:
