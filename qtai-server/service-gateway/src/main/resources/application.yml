server:
  port: 8000

spring:
  application:
    name: service-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 2000        # ms — 다운스트림 연결 타임아웃
        response-timeout: 5s         # 응답 타임아웃(초과 시 504)
      routes:
        # Strangler: 서비스 추출 전까지 모든 /api/v1/** 를 모놀리식(qtai-server)으로 라우팅.
        # 추출이 진행되면 도메인별 경로를 각 서비스 URI로 분기한다(bible/today-qt/note/sharing/mypage).
        - id: monolith
          uri: ${GATEWAY_MONOLITH_URI:http://localhost:8080}
          predicates:
            - Path=/api/v1/**
          filters:
            # 다운스트림 장애 시 Circuit Breaker 개방 → 폴백(503 표준 envelope)
            - name: CircuitBreaker
              args:
                name: monolithCb
                fallbackUri: forward:/__fallback
