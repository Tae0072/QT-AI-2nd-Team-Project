# 시연(demo) 프로파일 — 실제 MySQL/Redis(Docker Compose) + 정식 JWT 인증 ON.
#
# dev 프로파일과 인프라(MySQL/Redis)는 같고, 정식 SecurityConfig(JWT 인증)가 활성화된다.
# (2026-06-05 Lead 결정: 시연은 정식 인증 프로파일 사용. 2026-06-12: dev-bypass 토글·DevSecurityConfig 제거됨.)
#
# JWT 키는 .env(JWT_PRIVATE_KEY/JWT_PUBLIC_KEY)로 주입한다 — 저장소에 평문 키를 두지 않는다.
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/qtai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:qtai}
    password: ${DB_PASSWORD:qtai}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

# 정식 인증 체인(JWT) 활성 — 무인증 노출 없음.
