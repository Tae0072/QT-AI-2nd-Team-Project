# dev 프로파일 — 실제 MySQL 연결(Docker Compose의 MySQL 8.0).
# 로컬 빠른 개발(인프라 없이 H2)은 local 프로파일을 사용한다.
# 기동 전 `docker compose up -d mysql redis`로 MySQL/Redis를 띄운다.
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/qtai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:qtai}
    password: ${DB_PASSWORD:qtai}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    # dev 전용 관리자 시드 location 추가 (prod/demo는 base의 classpath:db/migration만 → 시드 운영 미적용).
    locations: classpath:db/migration,classpath:db/dev-seed
    placeholders:
      devAdminKakaoId: ${DEV_ADMIN_KAKAO_ID:9000000001}
      devAdminNickname: ${DEV_ADMIN_NICKNAME:개발관리자}
      devAdminRole: ${DEV_ADMIN_ROLE:OPERATOR}

# dev 전용 보안 우회 토글 (DevSecurityConfig 활성화 조건)
# - 2026-06-11 결정: 관리자 자체 아이디/비밀번호 로그인 도입으로 dev에서도 정식 JWT 체인을 쓴다.
#   따라서 dev-bypass=false(정식 SecurityConfig 활성). 개발용 토큰/X-Dev 헤더 우회는 사용하지 않는다.
#   dev 관리자 계정은 Flyway dev-seed(R__seed_dev_admin_account.sql)로 시드된다: admin / admin1234.
# - 운영(prod)에서는 절대 true로 두지 않는다 (application-prod.yml에서 false 강제)
qtai:
  security:
    dev-bypass: false
