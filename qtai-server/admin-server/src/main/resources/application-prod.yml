spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    # 운영은 정식 마이그레이션만 — dev 전용 시드(db/dev-seed)가 상속으로 섞이지 않도록 명시 잠금.
    locations: classpath:db/migration

security:
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:1800000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:1209600000}

# 운영 환경 — DevSecurityConfig 활성화 절대 금지
qtai:
  security:
    dev-bypass: false
  # 탈퇴 회원 보존기간(2년) 만료 정리 배치 활성화 — admin 검증 통합 완료 후 운영에서 켠다(매일 03:00 KST hard delete).
  retention:
    purge:
      enabled: ${QTAI_RETENTION_PURGE_ENABLED:true}
