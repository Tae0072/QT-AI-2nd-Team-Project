server:
  port: ${BIBLE_SERVICE_PORT:8082}

spring:
  application:
    name: bible-service
  # skeleton 단계는 도메인 빈/DB를 전용 설정에서만 활성화 → 기본 자동설정을 끈다.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

qtai:
  bible:
    inbound:
      enabled: ${QTAI_BIBLE_INBOUND_ENABLED:false}
    persistence:
      enabled: ${QTAI_BIBLE_PERSISTENCE_ENABLED:false}
      url: ${QTAI_BIBLE_DB_URL:}
      username: ${QTAI_BIBLE_DB_USERNAME:}
      password: ${QTAI_BIBLE_DB_PASSWORD:}
      driver-class-name: ${QTAI_BIBLE_DB_DRIVER_CLASS_NAME:}
      ddl-auto: ${QTAI_BIBLE_DB_DDL_AUTO:validate}
      dialect: ${QTAI_BIBLE_DB_DIALECT:}
      flyway-enabled: ${QTAI_BIBLE_DB_FLYWAY_ENABLED:true}
      flyway-locations: ${QTAI_BIBLE_DB_FLYWAY_LOCATIONS:classpath:db/migration}

management:
  endpoints:
    web:
      exposure:
        include: health
