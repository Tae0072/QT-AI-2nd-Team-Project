# 시연(demo) 프로파일 — 실제 MySQL/Redis(Docker Compose) + 정식 JWT 인증 ON.
#
# dev 프로파일과 인프라(MySQL/Redis)는 같지만 qtai.security.dev-bypass를 설정하지 않아
# 정식 SecurityConfig(JWT 인증)가 활성화된다. 시연 스택이 무인증(dev-bypass)으로 8080을
# 노출하던 문제를 막기 위해 시연은 이 프로파일을 사용한다 (2026-06-05 Lead 결정).
#
# JWT 키는 .env(JWT_PRIVATE_KEY/JWT_PUBLIC_KEY)로 주입한다 — 저장소에 평문 키를 두지 않는다.
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/qtai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:qtai}
    password: ${DB_PASSWORD:qtai}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

# dev-bypass를 의도적으로 설정하지 않는다 → 정식 인증 체인 활성(무인증 노출 차단).
