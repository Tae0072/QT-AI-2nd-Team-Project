spring:
  application:
    name: qtai-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # JPA 공통
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  # Jackson
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  # Redis 공통
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT — RS256 (키는 반드시 환경변수로 주입, 기본값 없음)
security:
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:1800000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:1209600000}

# Kakao OAuth
kakao:
  api:
    user-info-url: https://kapi.kakao.com/v2/user/me

external:
  llm:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
      connect-timeout-ms: ${DEEPSEEK_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${DEEPSEEK_READ_TIMEOUT_MS:30000}

ai:
  generation:
    worker:
      enabled: ${AI_GENERATION_WORKER_ENABLED:true}
      fixed-delay-ms: ${AI_GENERATION_WORKER_FIXED_DELAY_MS:10000}
      batch-size: ${AI_GENERATION_WORKER_BATCH_SIZE:5}

qtai:
  ai:
    client:
      mode: ${QTAI_AI_CLIENT_MODE:mock}
      service-token: ${QTAI_AI_CLIENT_SERVICE_TOKEN:}
      timeout-ms: ${QTAI_AI_CLIENT_TIMEOUT_MS:3000}
      qt:
        base-url: ${QTAI_AI_CLIENT_QT_BASE_URL:}
      bible:
        base-url: ${QTAI_AI_CLIENT_BIBLE_BASE_URL:}
      study:
        base-url: ${QTAI_AI_CLIENT_STUDY_BASE_URL:}
      audit:
        base-url: ${QTAI_AI_CLIENT_AUDIT_BASE_URL:}
      admin-auth:
        base-url: ${QTAI_AI_CLIENT_ADMIN_AUTH_BASE_URL:}
  validation:
    restricted-storage-root: ${QTAI_RESTRICTED_STORAGE_ROOT:./restricted}
  # bible 도메인 호출 방식(MSA Inc3 Strangler). 기본 inprocess=모놀리식 BibleService(동작 무변경).
  # http면 external/bible HTTP 어댑터가 @Primary로 등록되어 bible-service를 호출(토큰은 SYSTEM 인증용, env 주입).
  bible:
    client:
      mode: ${QTAI_BIBLE_CLIENT_MODE:inprocess}
      base-url: ${QTAI_BIBLE_CLIENT_BASE_URL:}
      gateway-token: ${QTAI_BIBLE_CLIENT_GATEWAY_TOKEN:}
      timeout-ms: ${QTAI_BIBLE_CLIENT_TIMEOUT_MS:3000}
      # 일시 오류(5xx·연결/타임아웃) 재시도. 4xx는 재시도 안 함.
      retry-max-attempts: ${QTAI_BIBLE_CLIENT_RETRY_MAX_ATTEMPTS:3}
      retry-backoff-ms: ${QTAI_BIBLE_CLIENT_RETRY_BACKOFF_MS:100}
      # Circuit Breaker(Resilience4j) — 지속 장애 시 fast-fail. 일시 장애(재시도 소진)만 실패로 기록, 4xx 제외.
      cb-failure-rate-threshold: ${QTAI_BIBLE_CLIENT_CB_FAILURE_RATE:50}
      cb-sliding-window-size: ${QTAI_BIBLE_CLIENT_CB_WINDOW:10}
      cb-minimum-calls: ${QTAI_BIBLE_CLIENT_CB_MIN_CALLS:5}
      cb-wait-duration-seconds: ${QTAI_BIBLE_CLIENT_CB_WAIT_SEC:10}

qt:
  today-source:
    sum:
      enabled: ${QT_TODAY_SUM_ENABLED:true}
      url: ${QT_TODAY_SUM_URL:https://sum.su.or.kr:8888/bible/today}

server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
