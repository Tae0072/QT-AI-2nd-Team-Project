spring:
  application:
    name: qtai-server
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/qtai?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:qtai}
    password: ${DB_PASSWORD:qtai}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

security:
  jwt:
    # RSA 2048 키 쌍 — 개인키(서명), 공개키(검증)
    # MSA 전환 시 공개키만 각 서비스에 배포하면 검증 가능
    # 운영 환경에서는 반드시 환경 변수로 주입 (JWT_PRIVATE_KEY, JWT_PUBLIC_KEY)
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}
    access-expiry-ms: 1800000   # 30분
    refresh-expiry-ms: 2592000000  # 30일

kakao:
  api:
    user-info-url: https://kapi.kakao.com/v2/user/me
