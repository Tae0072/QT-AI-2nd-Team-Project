spring:
  application:
    name: qtai-server
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/qtai?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:qtai}
    password: ${DB_PASSWORD:qtai}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

security:
  jwt:
    # RSA 2048 키 쌍 — 환경 변수로 주입 필수 (default 없음, 미설정 시 부팅 실패)
    # 키 생성: openssl genrsa -out private.pem 2048
    #          openssl pkcs8 -topk8 -nocrypt -in private.pem | base64 -w0
    #          openssl rsa -pubout -in private.pem | base64 -w0
    # MSA 전환 시 공개키만 각 서비스에 배포하면 검증 가능
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:1800000}    # 기본 30분
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:2592000000} # 기본 30일

kakao:
  api:
    user-info-url: https://kapi.kakao.com/v2/user/me
