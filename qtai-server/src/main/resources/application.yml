spring:
  application:
    name: qtai-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # JPA 공통
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  # Jackson
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  # Redis 공통
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT — RS256 (키는 반드시 환경변수로 주입, 기본값 없음)
security:
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:1800000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:1209600000}

# Kakao OAuth
kakao:
  api:
    user-info-url: https://kapi.kakao.com/v2/user/me
  # 웹 카카오 로그인(서버 OAuth, B안) — DRAFT. CLAUDE.md §1(서버 OAuth 미사용) 결정과 충돌 → 강사/Lead 검토 후 사용.
  # 실제 동작에는 Kakao 개발자 콘솔에 Web 플랫폼/Redirect URI 등록 + 아래 키 주입 필요.
  oauth:
    token-url: ${KAKAO_TOKEN_URL:https://kauth.kakao.com/oauth/token}
    rest-api-key: ${KAKAO_REST_API_KEY:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_WEB_REDIRECT_URI:http://localhost:3000/auth/kakao/callback}

external:
  llm:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
      connect-timeout-ms: ${DEEPSEEK_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${DEEPSEEK_READ_TIMEOUT_MS:30000}

ai:
  generation:
    worker:
      enabled: ${AI_GENERATION_WORKER_ENABLED:true}
      fixed-delay-ms: ${AI_GENERATION_WORKER_FIXED_DELAY_MS:10000}
      batch-size: ${AI_GENERATION_WORKER_BATCH_SIZE:5}

qtai:
  validation:
    restricted-storage-root: ${QTAI_RESTRICTED_STORAGE_ROOT:./restricted}

qt:
  today-source:
    sum:
      enabled: ${QT_TODAY_SUM_ENABLED:true}
      url: ${QT_TODAY_SUM_URL:https://sum.su.or.kr:8888/bible/today}

server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
