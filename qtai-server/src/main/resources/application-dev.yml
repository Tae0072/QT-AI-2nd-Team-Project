spring:
  datasource:
    url: jdbc:h2:mem:qtai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

# dev 전용 보안 우회 토글 (DevSecurityConfig 활성화 조건)
# - 운영(prod)에서는 절대 true로 두지 않는다 (application-prod.yml에서 false 강제)
qtai:
  security:
    dev-bypass: true
