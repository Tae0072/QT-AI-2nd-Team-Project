spring:
  datasource:
    url: jdbc:h2:mem:qtai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  # H2 Console — local 프로파일 전용. SecurityConfig에서 /h2-console/** permitAll 필요.
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
