spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

security:
  jwt:
    # 테스트용 RSA 키 — 운영 키와 동일한 키를 사용 (dev default 값)
    private-key: 
    public-key: 
    access-expiry-ms: 1800000
    refresh-expiry-ms: 2592000000

kakao:
  api:
    user-info-url: https://kapi.kakao.com/v2/user/me
