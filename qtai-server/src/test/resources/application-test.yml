spring:
  datasource:
    url: jdbc:h2:mem:qtai-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false
  # Redis — @DataJpaTest에서는 미사용. 전체 컨텍스트 로드 테스트(@SpringBootTest) 시 필요.
  data:
    redis:
      host: localhost
      port: 6379

# 테스트용 JWT placeholder (실제 키 아님 — 컨텍스트 로드 전용)
security:
  jwt:
    private-key: test-private-key-placeholder
    public-key: test-public-key-placeholder
    access-expiry-ms: 1800000
    refresh-expiry-ms: 1209600000
