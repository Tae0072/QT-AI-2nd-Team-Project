spring:
  datasource:
    url: jdbc:h2:mem:qtai-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

security:
  jwt:
    # 테스트 전용 RSA 키 — 운영 키와 별개. 풀 컨텍스트 로드(JwtProvider 생성자에서 키 파싱)를 위해 유효 키 사용. gitleaks allowlist 적용.
    private-key: 
    public-key: 
    access-expiry-ms: 1800000
    refresh-expiry-ms: 1209600000

kakao:
  api:
    user-info-url: https://test.kakao.com/v2/user/me

external:
  llm:
    deepseek:
      api-key: placeholder-credential
      base-url: https://test.deepseek.local
      model: deepseek-v4-flash
      connect-timeout-ms: 100
      read-timeout-ms: 100
