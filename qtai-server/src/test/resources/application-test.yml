spring:
  datasource:
    url: jdbc:h2:mem:qtai-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

security:
  jwt:
    private-key: test-private-key-placeholder
    public-key: test-public-key-placeholder
    access-expiry-ms: 1800000
    refresh-expiry-ms: 1209600000

kakao:
  api:
    user-info-url: https://test.kakao.com/v2/user/me
