spring:
  datasource:
    url: jdbc:h2:mem:qtai-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

security:
  jwt:
    # 평문 RSA 키를 저장소에 두지 않는다(P1-5). 테스트 부팅 시 JwtTestKeysContextCustomizerFactory가
    # 런타임 생성한 키를 security.jwt.private-key/public-key로 주입한다(META-INF/spring.factories).
    access-expiry-ms: 1800000
    refresh-expiry-ms: 1209600000

kakao:
  api:
    user-info-url: https://test.kakao.com/v2/user/me

external:
  llm:
    deepseek:
      api-key: placeholder-credential
      base-url: https://test.deepseek.local
      model: deepseek-v4-flash
      connect-timeout-ms: 100
      read-timeout-ms: 100
