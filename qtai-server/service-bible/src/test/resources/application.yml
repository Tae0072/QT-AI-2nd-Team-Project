# service-bible 테스트 공통 설정.
spring:
  jpa:
    hibernate:
      # H2 인메모리에 엔티티로 스키마 생성 (운영 기본값 validate를 테스트에서 덮어씀)
      ddl-auto: create-drop
qt:
  today-source:
    sum:
      # 성서유니온 수집 스케줄러 빈을 생성하지 않는다(@ConditionalOnProperty).
      # 통합 테스트 기동 시 외부 HTTP 호출이 일어나지 않도록 차단.
      enabled: false

# 배경음악 번들 시드 비활성(테스트는 음원 리소스를 적재하지 않는다).
# ddl-auto=create-drop로 만든 H2 스키마는 audio_data가 작아 시드(blob)가 실패하므로
# admin-server 테스트와 동일하게 끈다. 운영은 Flyway(LONGBLOB) + seed ON.
qtai:
  music:
    seed:
      enabled: false
