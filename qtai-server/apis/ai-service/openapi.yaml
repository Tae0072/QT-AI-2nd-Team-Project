openapi: 3.0.3
info:
  title: QT-AI AI Service Boundary API
  version: "0.1.0"
  description: Draft contract for extracting the AI domain into ai-service.
servers:
  - url: http://localhost:8081
    description: Local ai-service
security:
  - serviceToken: []
tags:
  - name: AI System
  - name: AI Admin
  - name: AI QA
x-ai-service-dependencies:
  qt:
    currentTarget: qtai-server
    futureTarget: qt-service
    clientInterface: QtContextClient
    todayQtPassageStatus:
      cacheStatusEnum: [HIT, MISS, STALE_FALLBACK, EMPTY]
    operations:
      - getQtContext
      - getTodayQtPassageStatus
  bible:
    currentTarget: qtai-server
    clientInterface: BibleVerseClient
    operations:
      - getVerse
      - getVersesByIds
      - getVersesInRange
  study:
    currentTarget: qtai-server
    clientInterface: StudyPublishClient
    operations:
      - publishApprovedVerseExplanation
      - hidePublishedVerseExplanation
  audit:
    currentTarget: qtai-server
    clientInterface: AuditLogClient
    operations:
      - writeAuditLog
  adminAuth:
    currentTarget: qtai-server
    clientInterface: AdminAuthClient
    operations:
      - getActiveAdmin
      - verifyRole
      - verifyAnyRole
x-ai-client-failure-model:
  exception: AiClientException
  retryableCodes: [TIMEOUT, RATE_LIMITED, CIRCUIT_OPEN, TEMPORARY_UNAVAILABLE, DOWNSTREAM_ERROR]
  nonRetryableCodes: [UNAUTHORIZED, FORBIDDEN, NOT_FOUND, VALIDATION_FAILED, RESPONSE_MAPPING_FAILED]
  policy: HTTP client implementations must map timeout, retry, and circuit breaker outcomes to this model.
x-ai-inbound-api-skeleton:
  purpose: Opt-in controller skeleton inventory copied from the monolith AI system/admin boundary.
  activation:
    property: qtai.ai.inbound.enabled
    default: false
    enabledValue: true
  implementationPolicy:
    businessLogic: Implemented only when inbound and persistence opt-in properties are both enabled.
    useCaseBeans: Provided by ai-service internal persistence skeleton under opt-in conditions; no production fake use cases.
    adminAuthorization: ROLE_ADMIN authority plus AdminAuthClient.verifyAnyRole.
    systemAuthorization: SYSTEM_BATCH or ROLE_SYSTEM_BATCH authority.
    openApiParity: Detailed path/schema parity is deferred to a dedicated follow-up PR.
  endpoints:
    system:
      - method: POST
        path: /api/v1/system/ai/generation-jobs
      - method: POST
        path: /api/v1/system/ai/assets
      - method: POST
        path: /api/v1/system/ai/validation-logs
      - method: POST
        path: /api/v1/system/validation-reference-jobs
      - method: GET
        path: /api/v1/system/validation-reference-jobs/{jobId}
      - method: POST
        path: /api/v1/system/validation-reference-jobs/{jobId}/expire
    admin:
      - method: GET
        path: /api/v1/admin/ai/assets
      - method: GET
        path: /api/v1/admin/ai/assets/{assetId}
      - method: POST
        path: /api/v1/admin/ai/assets/{assetId}/approve
      - method: POST
        path: /api/v1/admin/ai/assets/{assetId}/reject
      - method: POST
        path: /api/v1/admin/ai/assets/{assetId}/hide
      - method: POST
        path: /api/v1/admin/ai/assets/{assetId}/regenerate
      - method: GET
        path: /api/v1/admin/ai/monitoring
      - method: GET
        path: /api/v1/admin/ai/batch-run-logs
      - method: GET
        path: /api/v1/admin/ai/validation-checklists
      - method: POST
        path: /api/v1/admin/ai/validation-checklists
      - method: POST
        path: /api/v1/admin/ai/validation-checklists/{id}/activate
      - method: POST
        path: /api/v1/admin/ai/validation-checklists/{id}/retire
x-ai-outbound-system-endpoints:
  purpose: Contracts for provider service endpoints called by ai-service after MSA extraction.
  pathExposurePolicy: Provider service endpoints are outbound dependencies and must not be added to ai-service paths.
  common:
    basePrefix: /api/v1/system/**
    authentication:
      header: Authorization
      scheme: Bearer service-token
      requiredAuthority: SYSTEM_BATCH
    responseEnvelope: ApiResponse<T>
    writeEndpointIdempotencyKeyRequired: true
    trace:
      requestHeader: traceparent
      responseField: traceId
    errorMapping:
      source: ApiResponse.error(code,message)
      targetException: AiClientException
    bibleDataGuard: Korean Bible 88.json and KJV only; prohibited translations and copyrighted QT body text must not be included in seed, fixture, or response data.
  endpoints:
    qtContext:
      provider: today-qt
      clientInterface: QtContextClient
      clientOperation: getQtContext
      method: GET
      path: /api/v1/system/qt/passages/{passageId}/context
      responseEnvelope: ApiResponse<QtContextResult>
      responseSchema: "#/components/schemas/QtContextResult"
      cacheStatus: excluded
      passageContextPolicy: Allowed AI generation and validation metadata/context block, not full raw scripture body text.
      liveStage: 2
    todayQtPassageStatus:
      provider: today-qt
      clientInterface: QtContextClient
      clientOperation: getTodayQtPassageStatus
      method: GET
      path: /api/v1/system/qt/passages/today/status
      queryParameters: [date]
      responseEnvelope: ApiResponse<TodayQtPassageStatus>
      responseSchema: "#/components/schemas/TodayQtPassageStatus"
      cacheStatusEnum: [HIT, MISS, STALE_FALLBACK, EMPTY]
      liveStage: 2
    bible:
      provider: bible
      clientInterface: BibleVerseClient
      operations:
        getVerse:
          method: GET
          path: /api/v1/system/bible/verses/{verseId}
          responseEnvelope: ApiResponse<BibleVerseResult>
          responseSchema: "#/components/schemas/BibleVerseResult"
        getVersesByIds:
          method: POST
          path: /api/v1/system/bible/verses:batch
          requestSchema: "#/components/schemas/BibleVerseBatchRequest"
          responseEnvelope: ApiResponse<BibleVerseBatchResult>
          responseSchema: "#/components/schemas/BibleVerseBatchResult"
        getVersesInRange:
          method: GET
          path: /api/v1/system/bible/verses
          queryParameters: [book, chapter, startVerse, endVerse]
          responseEnvelope: ApiResponse<BibleVerseRangeResult>
          responseSchema: "#/components/schemas/BibleVerseRangeResult"
      liveStage: 1
    study:
      provider: today-qt
      clientInterface: StudyPublishClient
      operations:
        publishApprovedVerseExplanation:
          method: POST
          path: /api/v1/system/study/verse-explanations:publish
          idempotencyKeyRequired: true
          requestSchema: "#/components/schemas/PublishVerseExplanationCommand"
          responseEnvelope: ApiResponse<Void>
        hidePublishedVerseExplanation:
          method: POST
          path: /api/v1/system/study/verse-explanations:hide
          idempotencyKeyRequired: true
          requestSchema: "#/components/schemas/HideVerseExplanationCommand"
          responseEnvelope: ApiResponse<Void>
      liveStage: 2
    audit:
      provider: admin-service
      clientInterface: AuditLogClient
      operations:
        writeAuditLog:
          method: POST
          path: /api/v1/system/audit/logs
          idempotencyKeyRequired: true
          requestSchema: "#/components/schemas/AuditLogCommand"
          responseEnvelope: ApiResponse<Void>
      liveStage: 5
    adminAuth:
      provider: admin-service
      clientInterface: AdminAuthClient
      operations:
        getActiveAdmin:
          method: GET
          path: /api/v1/system/admin/auth/active
          queryParameters: [memberId]
          responseEnvelope: ApiResponse<AdminAuthResult>
          responseSchema: "#/components/schemas/AdminAuthResult"
        verifyRole:
          method: GET
          path: /api/v1/system/admin/auth/verify
          queryParameters: [memberId, role]
          responseEnvelope: ApiResponse<AdminAuthResult>
          responseSchema: "#/components/schemas/AdminAuthResult"
        verifyAnyRole:
          method: GET
          path: /api/v1/system/admin/auth/verify-any
          queryParameters: [memberId, roles]
          responseEnvelope: ApiResponse<AdminAuthResult>
          responseSchema: "#/components/schemas/AdminAuthResult"
      liveStage: 5
paths:
  /api/v1/system/ai/generation-jobs:
    post:
      tags:
        - AI System
      operationId: createAiGenerationJob
      summary: Create an AI generation job.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiGenerationJobRequest"
      responses:
        "202":
          description: AI generation job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAiGenerationJobApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/system/ai/assets:
    post:
      tags:
        - AI System
      operationId: registerAiGeneratedAsset
      summary: Register a generated AI asset.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterAiGeneratedAssetRequest"
      responses:
        "202":
          description: AI asset registration accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterAiGeneratedAssetApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/system/ai/validation-logs:
    post:
      tags:
        - AI System
      operationId: registerAiValidationLog
      summary: Register an AI validation log.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterAiValidationLogRequest"
      responses:
        "202":
          description: AI validation log registration accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterAiValidationLogApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/ai/qa-requests:
    post:
      tags:
        - AI QA
      operationId: requestAiQa
      summary: Request a single-turn fact-based AI answer.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestAiQaRequest"
      responses:
        "202":
          description: AI QA request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestAiQaApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/admin/ai/assets/{assetId}/approve:
    post:
      tags:
        - AI Admin
      operationId: approveAiAsset
      summary: Approve an AI asset.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewAiAssetRequest"
      responses:
        "200":
          description: AI asset approval completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewAiAssetApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/admin/ai/assets/{assetId}/reject:
    post:
      tags:
        - AI Admin
      operationId: rejectAiAsset
      summary: Reject an AI asset.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewAiAssetRequest"
      responses:
        "200":
          description: AI asset rejection completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewAiAssetApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/admin/ai/assets/{assetId}/hide:
    post:
      tags:
        - AI Admin
      operationId: hideAiAsset
      summary: Hide an AI asset.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewAiAssetRequest"
      responses:
        "200":
          description: AI asset hide completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewAiAssetApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    serviceToken:
      type: http
      scheme: bearer
      bearerFormat: service-token
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique key for deduplicating service-to-service write requests.
      schema:
        type: string
        minLength: 8
        maxLength: 128
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Unauthorized:
      description: Missing or invalid service token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Forbidden:
      description: Insufficient admin role.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
  schemas:
    ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        fields:
          type: object
          nullable: true
          additionalProperties:
            type: string
    ErrorApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum: [false]
        data:
          type: object
          nullable: true
        error:
          $ref: "#/components/schemas/ErrorBody"
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    QtContextResult:
      type: object
      description: QT context DTO consumed by AI generation and validation. cacheStatus is intentionally excluded.
      required:
        - passageId
        - bibleBook
        - chapter
        - startVerse
        - endVerse
        - passageReference
        - title
        - summary
        - passageContext
      properties:
        passageId:
          type: integer
          format: int64
        bibleBook:
          type: string
        chapter:
          type: integer
          format: int32
        startVerse:
          type: integer
          format: int32
        endVerse:
          type: integer
          format: int32
        passageReference:
          type: string
        title:
          type: string
        summary:
          type: string
        passageContext:
          type: string
          description: Allowed metadata/context block for AI generation and validation; not full raw scripture body text.
    TodayQtPassageStatus:
      type: object
      required:
        - qtDate
        - exists
        - cacheStatus
      properties:
        qtDate:
          type: string
          format: date
        exists:
          type: boolean
        passageId:
          type: integer
          format: int64
          nullable: true
        cacheStatus:
          type: string
          enum: [HIT, MISS, STALE_FALLBACK, EMPTY]
    BibleVerseResult:
      type: object
      required:
        - verseId
        - bibleBook
        - chapter
        - verse
        - reference
        - koreanText
        - englishText
      properties:
        verseId:
          type: integer
          format: int64
        bibleBook:
          type: string
        chapter:
          type: integer
          format: int32
        verse:
          type: integer
          format: int32
        reference:
          type: string
        koreanText:
          type: string
          description: Korean Bible text from allowed source only.
        englishText:
          type: string
          description: KJV text only.
    BibleVerseBatchRequest:
      type: object
      required:
        - verseIds
      properties:
        verseIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
    BibleVerseBatchResult:
      type: object
      required:
        - verses
      properties:
        verses:
          type: array
          items:
            $ref: "#/components/schemas/BibleVerseResult"
    BibleVerseRangeResult:
      type: object
      required:
        - bibleBook
        - chapter
        - verses
      properties:
        bibleBook:
          type: string
        chapter:
          type: integer
          format: int32
        startVerse:
          type: integer
          format: int32
          nullable: true
        endVerse:
          type: integer
          format: int32
          nullable: true
        verses:
          type: array
          items:
            $ref: "#/components/schemas/BibleVerseResult"
    PublishVerseExplanationCommand:
      type: object
      required:
        - bibleVerseId
        - summary
        - explanation
        - sourceLabel
        - aiAssetId
        - approvedAt
      properties:
        bibleVerseId:
          type: integer
          format: int64
        summary:
          type: string
        explanation:
          type: string
        sourceLabel:
          type: string
        aiAssetId:
          type: integer
          format: int64
        approvedAt:
          type: string
          format: date-time
    HideVerseExplanationCommand:
      type: object
      required:
        - aiAssetId
      properties:
        aiAssetId:
          type: integer
          format: int64
    AuditLogCommand:
      type: object
      required:
        - actorType
        - actionType
        - targetType
        - targetId
      properties:
        adminUserId:
          type: integer
          format: int64
          nullable: true
        actorType:
          type: string
        actorId:
          type: integer
          format: int64
          nullable: true
        actorLabel:
          type: string
          nullable: true
        actionType:
          type: string
        targetType:
          type: string
        targetId:
          type: integer
          format: int64
        beforeJson:
          type: string
          nullable: true
        afterJson:
          type: string
          nullable: true
    AdminRole:
      type: string
      enum: [OPERATOR, REVIEWER, CONTENT_CREATOR, SUPER_ADMIN]
    AdminAuthResult:
      type: object
      required:
        - adminUserId
        - memberId
        - adminRole
      properties:
        adminUserId:
          type: integer
          format: int64
        memberId:
          type: integer
          format: int64
        adminRole:
          $ref: "#/components/schemas/AdminRole"
    CreateAiGenerationJobRequest:
      type: object
      required:
        - jobType
        - targetType
        - targetId
        - promptVersionId
        - requestedBy
      properties:
        jobType:
          type: string
          enum: [EXPLANATION, SIMULATOR, QA]
        targetType:
          type: string
          enum: [QT_PASSAGE, BIBLE_VERSE]
        targetId:
          type: integer
          format: int64
        promptVersionId:
          type: integer
          format: int64
        requestedBy:
          type: string
          example: SYSTEM_BATCH
    CreateAiGenerationJobApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/CreateAiGenerationJobResponse"
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    CreateAiGenerationJobResponse:
      type: object
      required:
        - generationJobId
        - status
        - createdAt
      properties:
        generationJobId:
          type: integer
          format: int64
        status:
          type: string
          enum: [QUEUED, RUNNING, SUCCEEDED, FAILED]
        createdAt:
          type: string
          format: date-time
    RegisterAiGeneratedAssetRequest:
      type: object
      required:
        - generationJobId
        - assetType
        - targetType
        - targetId
        - payloadJson
      properties:
        generationJobId:
          type: integer
          format: int64
        assetType:
          type: string
          enum: [EXPLANATION, SIMULATOR, QA_RESPONSE]
        targetType:
          type: string
          enum: [QT_PASSAGE, BIBLE_VERSE]
        targetId:
          type: integer
          format: int64
        payloadJson:
          type: object
          additionalProperties: true
        sourceLabel:
          type: string
        status:
          type: string
          enum: [VALIDATING]
    RegisterAiGeneratedAssetResponse:
      type: object
      required:
        - assetId
        - status
      properties:
        assetId:
          type: integer
          format: int64
        status:
          type: string
    RegisterAiGeneratedAssetApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/RegisterAiGeneratedAssetResponse"
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    RegisterAiValidationLogRequest:
      type: object
      required:
        - aiAssetId
        - checklistVersionId
        - layer
        - result
        - checklistJson
        - reviewerType
      properties:
        aiAssetId:
          type: integer
          format: int64
        layer:
          type: integer
          minimum: 1
        reviewerType:
          type: string
          enum: [AUTO, ADVISOR, ADMIN]
        result:
          type: string
          enum: [PASSED, REJECTED, NEEDS_REVIEW]
        checklistVersionId:
          type: integer
          format: int64
        checklistJson:
          type: object
          additionalProperties: true
        errorMessage:
          type: string
    RegisterAiValidationLogResponse:
      type: object
      required:
        - validationLogId
        - result
        - assetStatus
      properties:
        validationLogId:
          type: integer
          format: int64
        result:
          type: string
        assetStatus:
          type: string
    RegisterAiValidationLogApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/RegisterAiValidationLogResponse"
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    RequestAiQaRequest:
      type: object
      required:
        - memberId
        - question
        - targetType
        - targetId
      properties:
        memberId:
          type: integer
          format: int64
        question:
          type: string
          maxLength: 1000
        targetType:
          type: string
          enum: [QT_PASSAGE, BIBLE_VERSE]
        targetId:
          type: integer
          format: int64
    AiQaBlockedReasonCategory:
      type: string
      description: F-15 blocked question policy category.
      enum: [VALUE_JUDGMENT, COUNSELING, FAITH_EVALUATION]
    AiQaBlockedReason:
      type: string
      description: >
        F-15 blocked reason. Category mapping is fixed by x-blocked-reason-category-map.
      enum: [VALUE_JUDGMENT, COUNSELING, FAITH_EVALUATION, CHOICE_DELEGATION, ASSERTIVE_SERMON]
      x-blocked-reason-category-map:
        VALUE_JUDGMENT: VALUE_JUDGMENT
        COUNSELING: COUNSELING
        FAITH_EVALUATION: FAITH_EVALUATION
        CHOICE_DELEGATION: COUNSELING
        ASSERTIVE_SERMON: FAITH_EVALUATION
    RequestAiQaResponse:
      type: object
      required:
        - requestId
        - status
      properties:
        requestId:
          type: integer
          format: int64
        status:
          type: string
          enum: [ACCEPTED, BLOCKED, ANSWERED, FAILED]
        blockedReason:
          allOf:
            - $ref: "#/components/schemas/AiQaBlockedReason"
          nullable: true
          description: Required when status is BLOCKED.
        blockedReasonCategory:
