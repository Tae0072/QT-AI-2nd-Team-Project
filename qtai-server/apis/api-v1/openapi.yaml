  /api/v1/system/ai/generation-jobs:
    post:
      tags:
        - System AI
      operationId: createSystemAiGenerationJob
      summary: 시스템 AI 생성 작업 접수
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        현재 계약은 구현된 컨트롤러 기준이며, service account 기반 검증 필터는 후속 작업 범위다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiGenerationJobRequest"
      responses:
        "202":
          description: AI 생성 작업 접수 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiGenerationJobAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/ai/assets:
    post:
      tags:
        - System AI
      operationId: registerSystemAiAsset
      summary: 시스템 AI 산출물 등록
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        산출물 상태는 요청자가 승인/반려 상태로 만들 수 없으며, status를 제공하는 경우 VALIDATING만 허용한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiAssetRequest"
      responses:
        "202":
          description: AI 산출물 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiAssetAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/ai/validation-logs:
    post:
      tags:
        - System AI
      operationId: registerSystemAiValidationLog
      summary: 시스템 AI 검증 로그 등록
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        validationReferenceJobId는 optional nullable 필드이며, 참조 검증 작업 API 자체는 후속 작업 범위다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiValidationLogRequest"
      responses:
        "202":
          description: AI 검증 로그 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiValidationLogAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        관리자 AI API는 ROLE_ADMIN과 세부 ADMIN_ROLE authority를 확인한다. 시스템 AI API는
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 확인하며, service account 기반 검증
        필터는 아직 구현 범위 밖이다.
  responses:
    BadRequest:
      description: 요청 값이 올바르지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Unauthorized:
      description: 인증이 필요함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Forbidden:
      description: 권한 부족
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    NotFound:
      description: 요청한 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Conflict:
      description: 상태 전이 또는 중복 처리 충돌
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
  schemas:
    ApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - false
        data:
          type: object
          nullable: true
        error:
          $ref: "#/components/schemas/ErrorBody"
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
