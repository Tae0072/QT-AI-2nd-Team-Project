        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/assets/{assetId}/approve:
    post:
      tags:
        - Admin AI
      operationId: approveAdminAiAsset
      summary: Approve admin AI asset
      description: >
        Approves a VALIDATING AI asset after checking that the latest layer 1 AUTO
        validation log and latest layer 2 ADVISOR validation log are both PASSED.
        When activateForTarget is true and the asset is EXPLANATION + BIBLE_VERSE,
        the approved explanation is published to
        verse_explanations as the active user-visible row.
      security:
        - bearerAuth: []
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAiAssetReviewRequest"
      responses:
        "200":
          description: Admin AI asset approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiAssetReviewApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/assets/{assetId}/reject:
    post:
