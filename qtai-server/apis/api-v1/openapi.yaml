        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAiValidationChecklistRequest"
      responses:
        "201":
          description: 관리자 AI 검증 체크리스트 버전 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiValidationChecklistApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
