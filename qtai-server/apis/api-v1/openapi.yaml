      description: >
        DRAFT 상태의 검증 체크리스트 버전 registry row를 생성한다. ACTIVE 또는 RETIRED 직접
        생성은 상태 전이 우회를 막기 위해 INVALID_INPUT으로 차단한다. 서버는 checklistType,
        version, contentHash, status만 저장하고 실제 체크리스트 원문은 외부 문서/파일을 SSoT로 둔다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAiValidationChecklistRequest"
      responses:
        "201":
          description: 관리자 AI 검증 체크리스트 버전 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiValidationChecklistApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/validation-checklists/{id}/activate:
