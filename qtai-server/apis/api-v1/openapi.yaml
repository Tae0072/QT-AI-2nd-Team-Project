          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/validation-reference-jobs/{jobId}:
    get:
      tags:
        - System AI
      operationId: getSystemValidationReferenceJob
      summary: 시스템 검증 참조 작업 단건 조회
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        응답에는 sourceFileHash, storageUri, indexStorageUri를 포함하지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 검증 참조 작업 단건 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationReferenceJobApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/validation-reference-jobs/{jobId}/expire:
    post:
      tags:
        - System AI
      operationId: expireSystemValidationReferenceJob
      summary: 시스템 검증 참조 작업 만료
      description: >
        ACTIVE 상태의 검증 참조 작업만 EXPIRED로 전이한다.
        실제 파일/색인 삭제와 DELETED 상태 전이는 후속 삭제 작업 범위다.
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 검증 참조 작업 만료 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationReferenceJobApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        관리자 AI API는 ROLE_ADMIN과 세부 ADMIN_ROLE authority를 확인한다. 시스템 API는
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 확인하며, service account 기반 검증
        필터는 아직 구현 범위 밖이다.
  parameters:
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  responses:
    BadRequest:
      description: 요청 값이 올바르지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Unauthorized:
      description: 인증이 필요함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Forbidden:
      description: 권한 부족
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    NotFound:
      description: 요청한 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Conflict:
      description: 상태 전이 또는 중복 처리 충돌
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
