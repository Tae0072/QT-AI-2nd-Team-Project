openapi: 3.0.3
info:
  title: QT-AI API
  version: "1.0.0"
  description: QT-AI 서버 v1 OpenAPI 명세 (각 도메인 PR에서 점진적으로 채워나감)
servers:
  - url: http://localhost:8080
    description: Local
tags:
  - name: Bible
    description: 성경 권 목록과 절 범위 조회 API
  - name: Note
    description: 묵상 노트와 자유 노트 CRUD API
  - name: My Page
    description: 마이페이지 대시보드와 묵상 달력 API
  - name: Admin AI
    description: 관리자 웹이 AI 산출물과 검증 로그를 검토하는 운영 API
  - name: System AI
    description: 시스템 배치가 AI 생성 작업, 산출물, 검증 로그를 접수하는 내부 운영 API
paths:
  /api/v1/bible/books:
    get:
      tags:
        - Bible
      operationId: listBibleBooks
      summary: 성경 권 목록 조회
      description: 인증된 사용자가 성경 권 목록을 displayOrder 순서로 조회한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 성경 권 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BibleBookListApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/bible/verses:
    get:
      tags:
        - Bible
      operationId: getBibleVerses
      summary: 성경 절 범위 조회
      description: 인증된 사용자가 책 코드, 장, 선택 절 범위로 성경 절을 조회한다.
      security:
        - bearerAuth: []
      parameters:
        - name: bookCode
          in: query
          required: true
          schema:
            type: string
            example: GEN
        - name: chapter
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: verseFrom
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            example: 2
        - name: verseTo
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            example: 4
      responses:
        "200":
          description: 성경 절 범위 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BibleVerseRangeApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          description: 요청 한도 초과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorApiResponse"
  /api/v1/notes:
    get:
      tags:
        - Note
      operationId: listNotes
      summary: 노트 목록 조회
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NoteCategory"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NoteStatus"
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 노트 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteListApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Note
      operationId: createNote
      summary: 노트 생성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteSaveRequest"
      responses:
        "201":
          description: 노트 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteCreateApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/notes/draft:
    get:
      tags:
        - Note
      operationId: getDraftNote
      summary: 임시 묵상 노트 조회
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          required: true
          schema:
            type: string
            enum:
              - MEDITATION
        - name: qtPassageId
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 임시 노트 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDraftApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/notes/{noteId}:
    get:
      tags:
        - Note
      operationId: getNote
      summary: 노트 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: 노트 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDetailApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Note
      operationId: updateNote
      summary: 노트 수정
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteSaveRequest"
      responses:
        "200":
          description: 노트 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteUpdateApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags:
        - Note
      operationId: deleteNote
      summary: 노트 삭제
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "204":
          description: 노트 삭제 성공
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/note-categories:
    get:
      tags:
        - Note
      operationId: listNoteCategories
      summary: 노트 카테고리 조회
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 노트 카테고리 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteCategoryApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/me/meditation-calendar:
    get:
      tags:
        - My Page
      operationId: getMeditationCalendar
      summary: 묵상 달력 조회
      description: 인증된 사용자의 월별 묵상 완료 상태를 notes.saved_at 기준으로 조회한다.
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
            example: "2026-05"
      responses:
        "200":
          description: 묵상 달력 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeditationCalendarApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/admin/ai/assets:
    get:
      tags:
        - Admin AI
      operationId: listAdminAiAssets
      summary: 관리자 AI 산출물 목록 조회
      description: >
        관리자 웹의 AI 산출물 검토 목록이다. ROLE_ADMIN과 ADMIN_ROLE_REVIEWER 또는
        ADMIN_ROLE_SUPER_ADMIN authority가 필요하다.
      security:
        - bearerAuth: []
      parameters:
        - name: assetType
          in: query
          required: false
          schema:
            type: string
            enum:
              - EXPLANATION
              - SUMMARY
              - GLOSSARY
              - SIMULATOR
              - QA_RESPONSE
        - name: targetType
          in: query
          required: false
          schema:
            type: string
            enum:
              - BIBLE_VERSE
              - QT_PASSAGE
              - QA_REQUEST
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - VALIDATING
              - APPROVED
              - REJECTED
              - HIDDEN
        - name: promptVersionId
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: checklistVersionId
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
          description: 최신 검증 로그의 checklistVersionId 기준으로 필터링한다.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 관리자 AI 산출물 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiAssetListApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/assets/{assetId}:
    get:
      tags:
        - Admin AI
      operationId: getAdminAiAsset
      summary: 관리자 AI 산출물 상세 조회
      description: >
        관리자 웹의 AI 산출물 상세 검토 화면에 필요한 산출물, 생성 작업, 프롬프트 버전,
        검증 로그 이력을 조회한다. ROLE_ADMIN과 ADMIN_ROLE_REVIEWER 또는 ADMIN_ROLE_SUPER_ADMIN
        authority가 필요하다.
      security:
        - bearerAuth: []
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 관리자 AI 산출물 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiAssetDetailApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/validation-checklists:
    get:
      tags:
        - Admin AI
      operationId: listAdminAiValidationChecklists
      summary: 관리자 AI 검증 체크리스트 버전 목록 조회
      description: >
        AI 검증 체크리스트 버전을 조회한다. ROLE_ADMIN과 ADMIN_ROLE_REVIEWER 또는
        ADMIN_ROLE_SUPER_ADMIN authority가 필요하며, 실제 체크리스트 원문은 외부 SSoT로
        관리하고 서버는 contentHash 기반 registry만 제공한다.
      security:
        - bearerAuth: []
      parameters:
        - name: checklistType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AiValidationChecklistType"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AiValidationChecklistStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 관리자 AI 검증 체크리스트 버전 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiValidationChecklistListApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags:
        - Admin AI
      operationId: createAdminAiValidationChecklist
      summary: 관리자 AI 검증 체크리스트 버전 생성
      description: >
        DRAFT 상태의 검증 체크리스트 버전 registry row를 생성한다. ACTIVE 또는 RETIRED 직접
        생성은 상태 전이 우회를 막기 위해 INVALID_INPUT으로 차단한다. 서버는 checklistType,
        version, contentHash, status만 저장하고 실제 체크리스트 원문은 외부 문서/파일을 SSoT로 둔다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAiValidationChecklistRequest"
      responses:
        "201":
          description: 관리자 AI 검증 체크리스트 버전 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiValidationChecklistApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/validation-checklists/{id}/activate:
    post:
      tags:
        - Admin AI
      operationId: activateAdminAiValidationChecklist
      summary: 관리자 AI 검증 체크리스트 버전 활성화
      description: >
        DRAFT 상태의 체크리스트 버전을 ACTIVE로 변경한다. 같은 checklistType의 기존 ACTIVE
        버전은 자동 RETIRED 처리한다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 관리자 AI 검증 체크리스트 버전 활성화 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiValidationChecklistApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/validation-checklists/{id}/retire:
    post:
      tags:
        - Admin AI
      operationId: retireAdminAiValidationChecklist
      summary: 관리자 AI 검증 체크리스트 버전 폐기
      description: ACTIVE 상태의 체크리스트 버전만 RETIRED로 변경한다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 관리자 AI 검증 체크리스트 버전 폐기 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiValidationChecklistApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/ai/generation-jobs:
    post:
      tags:
        - System AI
      operationId: createSystemAiGenerationJob
      summary: 시스템 AI 생성 작업 접수
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        현재 계약은 구현된 컨트롤러 기준이며, service account 기반 검증 필터는 후속 작업 범위다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiGenerationJobRequest"
      responses:
        "202":
          description: AI 생성 작업 접수 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiGenerationJobAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/ai/assets:
    post:
      tags:
        - System AI
      operationId: registerSystemAiAsset
      summary: 시스템 AI 산출물 등록
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        산출물 상태는 요청자가 승인/반려 상태로 만들 수 없으며, status를 제공하는 경우 VALIDATING만 허용한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiAssetRequest"
      responses:
        "202":
          description: AI 산출물 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiAssetAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/ai/validation-logs:
    post:
      tags:
        - System AI
      operationId: registerSystemAiValidationLog
      summary: 시스템 AI 검증 로그 등록
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        validationReferenceJobId는 optional nullable 필드이며, 참조 검증 작업 API 자체는 후속 작업 범위다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiValidationLogRequest"
      responses:
        "202":
          description: AI 검증 로그 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiValidationLogAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/validation-reference-jobs:
    post:
      tags:
        - System AI
      operationId: createSystemValidationReferenceJob
      summary: 시스템 검증 참조 작업 생성
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        서버는 검증 참조 원문을 응답으로 노출하지 않고 임시 파일/색인 위치와 상태만 registry로 관리한다.
        ROLE_ADMIN과 ADMIN_ROLE_CONTENT_CREATOR 직접 접근은 이번 구현 범위에서 제외한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemValidationReferenceJobRequest"
      responses:
        "201":
          description: 검증 참조 작업 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationReferenceJobApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/validation-reference-jobs/{jobId}:
    get:
      tags:
        - System AI
      operationId: getSystemValidationReferenceJob
      summary: 시스템 검증 참조 작업 단건 조회
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        응답에는 sourceFileHash, storageUri, indexStorageUri를 포함하지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 검증 참조 작업 단건 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationReferenceJobApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/validation-reference-jobs/{jobId}/expire:
    post:
      tags:
        - System AI
      operationId: expireSystemValidationReferenceJob
      summary: 시스템 검증 참조 작업 만료
      description: >
        ACTIVE 상태의 검증 참조 작업만 EXPIRED로 전이한다.
        실제 파일/색인 삭제와 DELETED 상태 전이는 후속 삭제 작업 범위다.
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 검증 참조 작업 만료 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationReferenceJobApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        관리자 AI API는 ROLE_ADMIN과 세부 ADMIN_ROLE authority를 확인한다. 시스템 API는
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 확인하며, service account 기반 검증
        필터는 아직 구현 범위 밖이다.
  parameters:
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  responses:
    BadRequest:
      description: 요청 값이 올바르지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Unauthorized:
      description: 인증이 필요함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Forbidden:
      description: 권한 부족
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    NotFound:
      description: 요청한 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Conflict:
      description: 상태 전이 또는 중복 처리 충돌
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
  schemas:
    ApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - false
        data:
          type: object
          nullable: true
        error:
          $ref: "#/components/schemas/ErrorBody"
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    BibleBookListApiResponse:
