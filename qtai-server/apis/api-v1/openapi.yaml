openapi: 3.0.3
info:
  title: QT-AI API
  version: "1.0.0"
  description: QT-AI 서버 v1 OpenAPI 명세 (각 도메인 PR에서 점진적으로 채워나감)
servers:
  - url: http://localhost:8080
    description: Local
tags:
  - name: Bible
    description: 성경 권 목록과 절 범위 조회 API
  - name: Note
    description: 묵상 노트와 자유 노트 CRUD API
  - name: QT Study
    description: QT 본문에 연결된 승인 해설, 용어, 시뮬레이터 조회 API
  - name: Admin
    description: 관리자 웹 공통 운영 API
  - name: Admin AI
    description: 관리자 웹이 AI 산출물과 검증 로그를 검토하는 운영 API
  - name: Admin Audit
    description: Admin audit log lookup API
  - name: System AI
    description: 시스템 배치가 AI 생성 작업, 산출물, 검증 로그를 접수하는 내부 운영 API
paths:
  /api/v1/bible/books:
    get:
      tags:
        - Bible
      operationId: listBibleBooks
      summary: 성경 권 목록 조회
      description: 인증된 사용자가 성경 권 목록을 displayOrder 순서로 조회한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 성경 권 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BibleBookListApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/bible/verses:
    get:
      tags:
        - Bible
      operationId: getBibleVerses
      summary: 성경 절 범위 조회
      description: 인증된 사용자가 책 코드, 장, 선택 절 범위로 성경 절을 조회한다.
      security:
        - bearerAuth: []
      parameters:
        - name: bookCode
          in: query
          required: true
          schema:
            type: string
            example: GEN
        - name: chapter
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: verseFrom
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            example: 2
        - name: verseTo
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            example: 4
      responses:
        "200":
          description: 성경 절 범위 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BibleVerseRangeApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          description: 요청 한도 초과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorApiResponse"
  /api/v1/qt/{qtPassageId}/study-content:
    get:
      tags:
        - QT Study
      operationId: getQtStudyContent
      summary: QT 학습 콘텐츠 조회
      description: 인증된 사용자가 QT 본문에 연결된 승인 해설과 승인 용어만 조회한다.
      security:
        - bearerAuth: []
      parameters:
        - name: qtPassageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: QT 학습 콘텐츠 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QtStudyContentApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/qt/{qtPassageId}/simulator:
    get:
      tags:
        - QT Study
      operationId: getQtSimulator
      summary: QT 시뮬레이터 조회
      description: >
        인증된 사용자가 QT 본문에 연결된 승인 시뮬레이터 클립을 조회한다.
        승인 클립이 있으면 READY와 clip payload를 반환하고, 없으면 검증 전 payload 없이 MISSING을 반환한다.
      security:
        - bearerAuth: []
      parameters:
        - name: qtPassageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: QT 시뮬레이터 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QtSimulatorApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/qt/{qtPassageId}/simulator-clips/{clipId}:
    get:
      tags:
        - QT Study
      operationId: getQtSimulatorClip
      summary: QT 시뮬레이터 클립 조회
      description: >
        04_API_명세서.md v1.7 기준 경로. 인증된 사용자가 QT 본문에 연결된 특정 승인 시뮬레이터 클립을 조회한다.
        clipId가 APPROVED 상태의 해당 QT 본문 클립이면 READY와 clip payload를 반환하고,
        승인 클립이 아니면 검증 전 payload 없이 MISSING을 반환한다.
      security:
        - bearerAuth: []
      parameters:
        - name: qtPassageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: clipId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: QT 시뮬레이터 클립 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QtSimulatorApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/notes:
    get:
      tags:
        - Note
      operationId: listNotes
      summary: 노트 목록 조회
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NoteCategory"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NoteStatus"
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 노트 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteListApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Note
      operationId: createNote
      summary: 노트 생성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteSaveRequest"
      responses:
        "201":
          description: 노트 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteCreateApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/notes/draft:
    get:
      tags:
        - Note
      operationId: getDraftNote
      summary: 임시 묵상 노트 조회
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          required: true
          schema:
            type: string
            enum:
              - MEDITATION
        - name: qtPassageId
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 임시 노트 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDraftApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/notes/{noteId}:
    get:
      tags:
        - Note
      operationId: getNote
      summary: 노트 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: 노트 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDetailApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Note
      operationId: updateNote
      summary: 노트 수정
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteSaveRequest"
      responses:
        "200":
          description: 노트 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteUpdateApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags:
        - Note
      operationId: deleteNote
      summary: 노트 삭제
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "204":
          description: 노트 삭제 성공
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/note-categories:
    get:
      tags:
        - Note
      operationId: listNoteCategories
      summary: 노트 카테고리 조회
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 노트 카테고리 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteCategoryApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/me/meditation-calendar:
    get:
      tags:
        - Note
      operationId: getMeditationCalendar
      summary: 묵상 달력 조회
      description: >
        인증 사용자의 월별 노트 저장 현황을 조회한다. 집계 기준은 notes.status=SAVED,
        notes.deleted_at IS NULL, notes.saved_at 날짜이며, 기록이 없는 날짜도 saved=false로 포함한다.
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
            example: "2026-05"
          description: yyyy-MM 형식. 생략하면 KST 현재 월을 사용한다.
      responses:
        "200":
          description: 묵상 달력 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeditationCalendarApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/admin/dashboard:
    get:
      tags:
        - Admin
      operationId: getAdminDashboard
      summary: 관리자 대시보드 조회
      description: >
        AD-01 관리자 대시보드 요약을 조회한다. ROLE_ADMIN과 OPERATOR, REVIEWER,
        또는 SUPER_ADMIN 세부 권한이 필요하다. 최근 감사 로그는 dashboard 전용
        sanitized DTO로 반환하며 beforeJson, afterJson, AI payload, prompt/provider
        원문, reason 원문을 포함하지 않는다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 관리자 대시보드 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/assets:
    get:
      tags:
        - Admin AI
      operationId: listAdminAiAssets
      summary: 관리자 AI 산출물 목록 조회
      description: >
        관리자 웹의 AI 산출물 검토 목록이다. ROLE_ADMIN과 ADMIN_ROLE_REVIEWER 또는
        ADMIN_ROLE_SUPER_ADMIN authority가 필요하다.
      security:
        - bearerAuth: []
      parameters:
        - name: assetType
          in: query
          required: false
          schema:
            type: string
            enum:
              - EXPLANATION
              - SUMMARY
              - GLOSSARY
              - SIMULATOR
              - QA_RESPONSE
        - name: targetType
          in: query
          required: false
          schema:
            type: string
            enum:
              - BIBLE_VERSE
              - QT_PASSAGE
              - QA_REQUEST
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - VALIDATING
              - APPROVED
              - REJECTED
              - HIDDEN
        - name: promptVersionId
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: checklistVersionId
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
          description: 최신 검증 로그의 checklistVersionId 기준으로 필터링한다.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 관리자 AI 산출물 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiAssetListApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/batch-run-logs:
    get:
      tags:
        - Admin AI
      operationId: listAdminAiBatchRunLogs
      summary: Admin AI batch run log list
      description: >
        Lists stored AI batch run logs for the admin web. Requires ROLE_ADMIN and
        one of ADMIN_ROLE_OPERATOR, ADMIN_ROLE_REVIEWER, or ADMIN_ROLE_SUPER_ADMIN.
        This endpoint returns stored redacted error messages only and does not expose
        raw provider responses or prompt text.
      security:
        - bearerAuth: []
      parameters:
        - name: batchName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AiBatchName"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AiBatchRunStatus"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-06-01"
          description: KST date. Inclusive createdAt lower bound.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-06-02"
          description: KST date. Inclusive date converted to exclusive next-day boundary.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Admin AI batch run log list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiBatchRunLogListApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/audit-logs:
    get:
      tags:
        - Admin Audit
      operationId: listAdminAuditLogs
      summary: Admin AI review audit log list
      description: >
        Lists audit_logs rows for AI review and regeneration actions only. Requires
        ROLE_ADMIN and one of ADMIN_ROLE_OPERATOR, ADMIN_ROLE_REVIEWER, or
        ADMIN_ROLE_SUPER_ADMIN. If actionType or targetType is omitted, the query
        defaults to the supported AI audit scope. This endpoint returns stored
        sanitized beforeJson/afterJson snapshots only and does not create raw
        prompt, provider response, payload, reason, secret, token, or password data.
      security:
        - bearerAuth: []
      parameters:
        - name: actorType
          in: query
          required: false
          schema:
            type: string
            example: ADMIN
        - name: actorId
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: actionType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AiAuditActionType"
        - name: targetType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AiAuditTargetType"
        - name: targetId
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-06-01"
          description: KST date. Inclusive createdAt lower bound.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-06-02"
          description: KST date. Inclusive date converted to exclusive next-day boundary.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Admin audit log list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/monitoring:
    get:
      tags:
        - Admin AI
      operationId: getAdminAiMonitoring
      summary: Admin AI operational monitoring summary
      description: >
        Returns aggregated AI operational monitoring metrics for the admin web.
        Requires ROLE_ADMIN and one of ADMIN_ROLE_OPERATOR, ADMIN_ROLE_REVIEWER,
        or ADMIN_ROLE_SUPER_ADMIN. If from/to are omitted, the KST current date
        is used as the default period. This endpoint does not expose raw asset
        payloads, prompt text, provider responses, or unredacted secret values.
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-06-02"
          description: KST date. Inclusive lower bound. Defaults to KST today when omitted.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-06-02"
          description: KST date. Inclusive date converted to exclusive next-day boundary.
      responses:
        "200":
          description: Admin AI monitoring summary returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiMonitoringApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/admin/ai/assets/{assetId}:
    get:
      tags:
        - Admin AI
      operationId: getAdminAiAsset
      summary: 관리자 AI 산출물 상세 조회
      description: >
        관리자 웹의 AI 산출물 상세 검토 화면에 필요한 산출물, 생성 작업, 프롬프트 버전,
        검증 로그 이력을 조회한다. ROLE_ADMIN과 ADMIN_ROLE_REVIEWER 또는 ADMIN_ROLE_SUPER_ADMIN
        authority가 필요하다.
      security:
        - bearerAuth: []
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 관리자 AI 산출물 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiAssetDetailApiResponse"
        "401":
