        - Admin AI
      operationId: listAdminAiValidationChecklists
      summary: 관리자 AI 검증 체크리스트 버전 목록 조회
      description: >
        AI 검증 체크리스트 버전을 조회한다. ROLE_ADMIN과 ADMIN_ROLE_REVIEWER 또는
        ADMIN_ROLE_SUPER_ADMIN authority가 필요하며, 실제 체크리스트 원문은 외부 SSoT로
        관리하고 서버는 contentHash 기반 registry만 제공한다.
      security:
        - bearerAuth: []
      parameters:
        - name: checklistType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AiValidationChecklistType"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AiValidationChecklistStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 관리자 AI 검증 체크리스트 버전 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiValidationChecklistListApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
