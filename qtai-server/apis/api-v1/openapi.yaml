      summary: 시스템 AI 산출물 등록
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        산출물 상태는 요청자가 승인/반려 상태로 만들 수 없으며, status를 제공하는 경우 VALIDATING만 허용한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiAssetRequest"
      responses:
        "202":
          description: AI 산출물 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiAssetAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/ai/validation-logs:
    post:
      tags:
        - System AI
      operationId: registerSystemAiValidationLog
      summary: 시스템 AI 검증 로그 등록
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        validationReferenceJobId는 optional nullable 필드이며, 참조 검증 작업 API 자체는 후속 작업 범위다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiValidationLogRequest"
      responses:
        "202":
          description: AI 검증 로그 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiValidationLogAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/validation-reference-jobs:
    post:
      tags:
        - System AI
      operationId: createSystemValidationReferenceJob
      summary: 시스템 검증 참조 작업 생성
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        서버는 검증 참조 원문을 응답으로 노출하지 않고 임시 파일/색인 위치와 상태만 registry로 관리한다.
        ROLE_ADMIN과 ADMIN_ROLE_CONTENT_CREATOR 직접 접근은 이번 구현 범위에서 제외한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemValidationReferenceJobRequest"
      responses:
        "201":
          description: 검증 참조 작업 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationReferenceJobApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/validation-reference-jobs/{jobId}:
    get:
      tags:
        - System AI
      operationId: getSystemValidationReferenceJob
      summary: 시스템 검증 참조 작업 단건 조회
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        응답에는 sourceFileHash, storageUri, indexStorageUri를 포함하지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 검증 참조 작업 단건 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationReferenceJobApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/validation-reference-jobs/{jobId}/expire:
    post:
      tags:
        - System AI
      operationId: expireSystemValidationReferenceJob
      summary: 시스템 검증 참조 작업 만료
      description: >
        ACTIVE 상태의 검증 참조 작업만 EXPIRED로 전이한다.
        실제 파일/색인 삭제와 DELETED 상태 전이는 후속 삭제 작업 범위다.
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 검증 참조 작업 만료 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationReferenceJobApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        관리자 AI API는 ROLE_ADMIN과 세부 ADMIN_ROLE authority를 확인한다. 시스템 API는
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 확인하며, service account 기반 검증
        필터는 아직 구현 범위 밖이다.
  parameters:
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  responses:
    BadRequest:
      description: 요청 값이 올바르지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Unauthorized:
      description: 인증이 필요함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Forbidden:
      description: 권한 부족
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    NotFound:
      description: 요청한 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Conflict:
      description: 상태 전이 또는 중복 처리 충돌
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
  schemas:
    ApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - false
        data:
          type: object
          nullable: true
        error:
          $ref: "#/components/schemas/ErrorBody"
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    AdminDashboardApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/AdminDashboardResponse"
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    AdminDashboardResponse:
      type: object
      required:
        - pendingAiValidationCount
        - receivedReportCount
        - reviewingReportCount
        - todayQt
        - recentAuditLogs
      properties:
        pendingAiValidationCount:
          type: integer
          format: int64
          example: 3
        receivedReportCount:
          type: integer
          format: int64
          example: 5
        reviewingReportCount:
          type: integer
          format: int64
          example: 2
        todayQt:
          $ref: "#/components/schemas/AdminDashboardTodayQt"
        recentAuditLogs:
          type: array
          items:
            $ref: "#/components/schemas/AdminDashboardRecentAuditLog"
    AdminDashboardTodayQt:
      type: object
      required:
        - qtDate
        - status
        - hasExplanation
      properties:
        qtDate:
          type: string
          format: date
          example: "2026-06-10"
        qtPassageId:
          type: integer
          format: int64
          nullable: true
          example: 35
        title:
          type: string
          nullable: true
          example: 오늘의 QT
        status:
          type: string
          description: QT passage availability for the dashboard. READY means a public QT passage is available; MISSING means no dashboard-displayable QT exists for the date.
          enum:
            - READY
            - MISSING
          example: READY
        simulatorStatus:
          type: string
          nullable: true
          enum:
            - READY
            - MISSING
            - FAILED
            - DISABLED
          example: MISSING
        hasExplanation:
          type: boolean
          example: true
        cacheStatus:
          type: string
          nullable: true
          enum:
            - HIT
            - MISS
            - STALE_FALLBACK
            - EMPTY
          example: HIT
    AdminDashboardRecentAuditLog:
      type: object
      required:
        - id
        - actorType
        - actionType
        - targetType
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          example: 10
        adminUserId:
          type: integer
          format: int64
          nullable: true
          example: 1
        actorType:
          type: string
          example: ADMIN
        actionType:
          type: string
          example: AI_ASSET_APPROVE
        targetType:
          type: string
          example: AI_GENERATED_ASSET
        targetId:
          type: integer
          format: int64
          nullable: true
          example: 500
        createdAt:
