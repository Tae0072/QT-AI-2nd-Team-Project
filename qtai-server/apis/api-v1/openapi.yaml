openapi: 3.0.3
info:
  title: QT-AI API
  version: "1.0.0"
  description: QT-AI 서버 v1 OpenAPI 명세
servers:
  - url: http://localhost:8080
    description: Local
tags:
  - name: Bible
    description: 성경 권 목록과 절 범위 조회 API
  - name: System AI
    description: 시스템 배치가 AI 생성 작업, 산출물, 검증 로그를 접수하는 내부 운영 API
paths:
  /api/v1/bible/books:
    get:
      tags:
        - Bible
      operationId: listBibleBooks
      summary: 성경 권 목록 조회
      description: 인증된 사용자가 성경 권 목록을 displayOrder 순서로 조회한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 성경 권 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BibleBookListApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/bible/verses:
    get:
      tags:
        - Bible
      operationId: getBibleVerses
      summary: 성경 절 범위 조회
      description: 인증된 사용자가 책 코드, 장, 선택 절 범위로 성경 절을 조회한다.
      security:
        - bearerAuth: []
      parameters:
        - name: bookCode
          in: query
          required: true
          schema:
            type: string
            example: GEN
        - name: chapter
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: verseFrom
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            example: 2
        - name: verseTo
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            example: 4
      responses:
        "200":
          description: 성경 절 범위 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BibleVerseRangeApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          description: 요청 한도 초과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorApiResponse"
  /api/v1/system/ai/generation-jobs:
    post:
      tags:
        - System AI
      operationId: createSystemAiGenerationJob
      summary: 시스템 AI 생성 작업 접수
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        현재 계약은 구현된 컨트롤러 기준이며, service account 기반 검증 필터는 후속 작업 범위다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiGenerationJobRequest"
      responses:
        "202":
          description: AI 생성 작업 접수 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiGenerationJobAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/ai/assets:
    post:
      tags:
        - System AI
      operationId: registerSystemAiAsset
      summary: 시스템 AI 산출물 등록
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        산출물 상태는 요청자가 승인/반려 상태로 만들 수 없으며, status를 제공하는 경우 VALIDATING만 허용한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiAssetRequest"
      responses:
        "202":
          description: AI 산출물 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiAssetAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/system/ai/validation-logs:
    post:
      tags:
        - System AI
      operationId: registerSystemAiValidationLog
      summary: 시스템 AI 검증 로그 등록
      description: >
        SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH authority를 가진 시스템 배치만 호출할 수 있다.
        validationReferenceJobId는 optional nullable 필드이며, 참조 검증 작업 API 자체는 후속 작업 범위다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemAiValidationLogRequest"
      responses:
        "202":
          description: AI 검증 로그 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemAiValidationLogAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        시스템 AI API는 bearer credential로 인증된 주체가 SYSTEM_BATCH 또는 ROLE_SYSTEM_BATCH
        authority를 가져야 한다. service account 기반 검증 필터는 아직 구현 범위 밖이다.
  responses:
    BadRequest:
      description: 요청 값이 올바르지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Unauthorized:
      description: 인증이 필요함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Forbidden:
      description: SYSTEM_BATCH 권한 부족
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    NotFound:
      description: 요청한 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    Conflict:
      description: 상태 전이 또는 중복 처리 충돌
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
  schemas:
    ApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
        data:
          type: object
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - false
        data:
          type: object
          nullable: true
        error:
          $ref: "#/components/schemas/ErrorBody"
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    BibleBookListApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: array
          items:
            $ref: "#/components/schemas/BibleBookResponse"
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    BibleVerseRangeApiResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/BibleVerseRangeResponse"
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    BibleBookResponse:
      type: object
      required:
        - id
        - testament
        - code
        - koreanName
        - englishName
        - displayOrder
      properties:
        id:
          type: integer
          format: int32
          example: 1
        testament:
          type: string
          enum:
            - OLD
            - NEW
        code:
          type: string
          example: GEN
        koreanName:
          type: string
          example: 창세기
        englishName:
          type: string
          example: Genesis
        displayOrder:
          type: integer
          format: int32
          example: 1
    BibleVerseRangeResponse:
      type: object
      required:
        - book
        - verses
      properties:
        book:
          $ref: "#/components/schemas/BibleVerseBookResponse"
        verses:
          type: array
          items:
            $ref: "#/components/schemas/BibleVerseResponse"
    BibleVerseBookResponse:
      type: object
      required:
        - code
        - koreanName
        - englishName
        - chapter
      properties:
        code:
          type: string
          example: GEN
        koreanName:
          type: string
          example: 창세기
        englishName:
          type: string
          example: Genesis
        chapter:
          type: integer
          example: 1
    BibleVerseResponse:
      type: object
      required:
        - id
        - bookCode
        - chapterNo
        - verseNo
        - koreanText
        - englishText
      properties:
        id:
          type: integer
          format: int64
          example: 10
        bookCode:
          type: string
          example: GEN
        chapterNo:
          type: integer
          example: 1
        verseNo:
          type: integer
          example: 2
        koreanText:
          type: string
          example: 검증용 한국어 본문
        englishText:
          type: string
          example: Test English body
    SystemAiGenerationJobRequest:
      type: object
      required:
        - promptVersionId
        - jobType
        - targetType
        - targetId
      properties:
        promptVersionId:
          type: integer
          format: int64
          minimum: 1
        jobType:
          type: string
          enum:
            - DAILY_QT_EXPLANATION
            - DAILY_QT_SIMULATOR
        targetType:
          type: string
          enum:
            - QT_PASSAGE
        targetId:
          type: integer
          format: int64
          minimum: 1
    SystemAiGenerationJobResponse:
      type: object
      required:
        - generationJobId
        - status
        - createdAt
      properties:
        generationJobId:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - QUEUED
            - RUNNING
            - SUCCEEDED
            - FAILED
        createdAt:
          type: string
          format: date-time
    SystemAiGenerationJobAcceptedResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/SystemAiGenerationJobResponse"
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    SystemAiAssetRequest:
      type: object
      required:
        - generationJobId
        - assetType
        - targetType
        - targetId
        - payloadJson
      properties:
        generationJobId:
          type: integer
          format: int64
          minimum: 1
        assetType:
          type: string
          enum:
            - EXPLANATION
            - SUMMARY
            - GLOSSARY
            - SIMULATOR
            - QA_RESPONSE
        targetType:
          type: string
          enum:
            - BIBLE_VERSE
            - QT_PASSAGE
            - QA_REQUEST
        targetId:
          type: integer
          format: int64
          minimum: 1
        payloadJson:
          type: object
          additionalProperties: true
        sourceLabel:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - VALIDATING
          nullable: true
    SystemAiAssetResponse:
      type: object
      required:
        - assetId
        - status
      properties:
        assetId:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - VALIDATING
            - APPROVED
            - REJECTED
            - HIDDEN
    SystemAiAssetAcceptedResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/SystemAiAssetResponse"
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
    SystemAiValidationLogRequest:
      type: object
      required:
        - aiAssetId
        - checklistVersionId
        - layer
        - result
        - checklistJson
        - reviewerType
      properties:
        aiAssetId:
          type: integer
          format: int64
          minimum: 1
        validationReferenceJobId:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        checklistVersionId:
          type: integer
          format: int64
          minimum: 1
        layer:
          type: integer
          format: int32
          minimum: 1
        result:
          type: string
          enum:
            - PASSED
            - REJECTED
            - NEEDS_REVIEW
        checklistJson:
          type: object
          additionalProperties: true
        reviewerType:
          type: string
          enum:
            - AUTO
            - ADMIN
            - ADVISOR
        errorMessage:
          type: string
          nullable: true
    SystemAiValidationLogResponse:
      type: object
      required:
        - validationLogId
        - result
        - assetStatus
      properties:
        validationLogId:
          type: integer
          format: int64
        result:
          type: string
          enum:
            - PASSED
            - REJECTED
            - NEEDS_REVIEW
        assetStatus:
          type: string
          enum:
            - VALIDATING
            - APPROVED
            - REJECTED
            - HIDDEN
    SystemAiValidationLogAcceptedResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/SystemAiValidationLogResponse"
        error:
          allOf:
            - $ref: "#/components/schemas/ErrorBody"
          nullable: true
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
