        - bearerAuth: []
      parameters:
        - name: checklistType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AiValidationChecklistType"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AiValidationChecklistStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: 관리자 AI 검증 체크리스트 버전 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAiValidationChecklistListApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
