spring:
  application:
    name: service-user
  # 단일 DB: 로컬/테스트는 H2(MySQL 모드), 운영은 env로 MySQL 주입
  datasource:
    url: ${DB_URL:jdbc:h2:mem:user;DB_CLOSE_DELAY=-1;MODE=MySQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      # 운영 안전 기본값 validate(env 누락 시 데이터 손실 방지). 로컬은 env로 create-drop/update 주입.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  # 프로필 사진 업로드(multipart) 최대 크기 — 서비스 검증은 5MB, 여유로 6MB 허용.
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 6MB
  # Jackson — 시간대/날짜 직렬화 정책(모놀리식과 동일)
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
  # Refresh Token 저장소(Redis). 커넥션은 지연 생성이라 미기동 시에도 부팅된다.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT — RS256. 발급(개인키)은 service-user 전용, 검증(공개키)은 lib-common 필터.
# 키는 반드시 환경변수로 주입(평문 키 커밋 금지, CLAUDE.md §8). 테스트는 런타임 생성 키 주입.
security:
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:1800000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:1209600000}
  # 공개 인증 경로 rate limit (코드리뷰 TODO 1) — IP+경로 1분 고정창, Redis 장애 시 fail-open.
  # trust-forwarded-for는 nginx gateway 뒤에 설 때만 true(env)로 켠다 — 직접 노출 시 헤더 위조 우회 방지.
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    trust-forwarded-for: ${RATE_LIMIT_TRUST_FORWARDED_FOR:false}
    rules:
      - path: /api/v1/auth/kakao
        limit-per-minute: ${RATE_LIMIT_AUTH_KAKAO_PER_MINUTE:10}
      - path: /api/v1/auth/refresh
        limit-per-minute: ${RATE_LIMIT_AUTH_REFRESH_PER_MINUTE:30}
      - path: /api/v1/admin/auth/kakao
        limit-per-minute: ${RATE_LIMIT_ADMIN_AUTH_KAKAO_PER_MINUTE:10}

# Kakao OAuth — Flutter SDK가 발급한 access token으로 사용자 정보 조회
kakao:
  api:
    user-info-url: ${KAKAO_USER_INFO_URL:https://kapi.kakao.com/v2/user/me}

# 관리자 웹(별도 오리진) CORS 허용 오리진(콤마 구분)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# 사용자/인증 서비스 포트 (env 주입 가능, 기본 8081)
server:
  port: ${USER_SERVICE_PORT:8081}
  servlet:
    encoding:
      charset: UTF-8
      force: true
