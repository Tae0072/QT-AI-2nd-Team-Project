spring:
  application:
    name: bff-aggregator
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  data:
    redis:
      host: ${REDIS_WS_HOST:localhost}
      port: ${REDIS_WS_PORT:6380}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      auto-offset-reset: earliest

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${GATEWAY_JWK_URI:http://gateway:8080/.well-known/jwks.json}

bff:
  bible-service:
    url: ${BIBLE_SERVICE_URL:http://bible-service:8082}
  ai-service:
    url: ${AI_SERVICE_URL:http://ai-service:8085}

server:
  port: ${BFF_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${JAEGER_ENDPOINT:http://jaeger:4318/v1/traces}

logging:
  level:
    root: INFO
    com.qtai: DEBUG
