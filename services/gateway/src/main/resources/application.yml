spring:
  application:
    name: gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Spring Cloud Gateway 라우팅 (DECISIONS.md §3 기준)
  cloud:
    gateway:
      routes:
        # BFF Aggregator
        - id: bff-aggregator
          uri: http://bff-aggregator:8083
          predicates:
            - Path=/api/v1/passages/**,/api/v1/me/**,/api/v1/qt/**,/api/v1/admin/**,/ws/**

        # Bible Service (Bible + Journal + Shares)
        - id: bible-service
          uri: http://bible-service:8082
          predicates:
            - Path=/bible/**,/api/v1/commentary/**,/api/v1/explanations/**,/api/v1/journals/**,/api/v1/shares/**

        # AI Service (Spring Boot :8085)
        - id: ai-service
          uri: http://ai-service:8085
          predicates:
            - Path=/ai/**

        # Auth endpoints are handled inside Gateway Auth module, not routed to a separate service.

  # JWT RS256 검증 (Gateway Auth JWK Set)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${GATEWAY_JWK_URI:http://gateway:8080/.well-known/jwks.json}

server:
  port: ${GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${JAEGER_ENDPOINT:http://jaeger:4318/v1/traces}

logging:
  level:
    root: INFO
    com.qtai: DEBUG
    org.springframework.cloud.gateway: INFO
