spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # MySQL 8.0 (DECISIONS.md 기준 RDBMS)
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:qtai}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: ${MYSQL_USERNAME:qtai_user}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Redis-WS (DECISIONS.md 기준 6380)
  data:
    redis:
      host: ${REDIS_WS_HOST:localhost}
      port: ${REDIS_WS_PORT:6380}

  # Kafka Producer (user.deactivated)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
        apicurio.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8086/apis/registry/v2}
        apicurio.registry.use-id: contentId

# JWT 설정 (DECISIONS.md 기준)
qtai:
  jwt:
    algorithm: RS256
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL:1800}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL:1209600}
    private-key-path: ${JWT_PRIVATE_KEY_PATH:./keys/private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:./keys/public.pem}
    issuer: https://api.qtai.app

  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}

server:
  port: ${AUTH_SERVICE_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${JAEGER_ENDPOINT:http://jaeger:4318/v1/traces}

logging:
  level:
    root: INFO
    com.qtai: DEBUG
