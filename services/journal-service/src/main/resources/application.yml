spring:
  application:
    name: journal-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # MySQL 8.0
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:qtai}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: ${MYSQL_USERNAME:qtai_user}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Kafka Consumer + Producer
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: journal-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        apicurio.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8086/apis/registry/v2}
    producer:
      acks: all
      properties:
        enable.idempotence: true
        apicurio.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8086/apis/registry/v2}
        apicurio.registry.use-id: contentId
    listener:
      ack-mode: manual_immediate

  # JWT RS256 검증
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_JWK_URI:http://auth-service:8081/.well-known/jwks.json}

server:
  port: ${JOURNAL_SERVICE_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${JAEGER_ENDPOINT:http://jaeger:4318/v1/traces}

logging:
  level:
    root: INFO
    com.qtai: DEBUG
