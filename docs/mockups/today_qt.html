<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>QT-AI Mockup · 오늘의 QT</title>
  <link rel="stylesheet" href="_styles.css">
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span>📶 100%</span>
    </div>
    <div class="app-bar">
      <h1>오늘의 QT</h1>
      <div>
        <button class="icon-btn" title="성경 보기">📖</button>
        <button class="icon-btn" title="묵상 노트">📝</button>
      </div>
    </div>
    <div class="body">
      <div class="card">
        <div class="passage-ref">창세기 1:1 · 2026-05-14 (목)</div>
        <p class="passage-kr">태초에 하나님이 천지를 창조하시니라</p>
        <p class="passage-en">In the beginning God created the heaven and the earth.</p>
      </div>

      <div class="section-title">한 줄 요약</div>
      <div class="card">하나님이 세상을 시작하셨다는 선언입니다.</div>

      <div class="section-title">배경</div>
      <div class="card">창세기 첫 장은 모든 것이 하나님에게서 시작되었다는 고백으로 시작합니다.</div>

      <div class="section-title">어려운 단어</div>
      <div class="card">
        <div><b>태초</b> — 모든 일이 시작되기 전, 가장 처음을 뜻합니다.</div>
      </div>

      <div style="margin-top: 28px;">
        <button class="fill-btn">💬 AI에게 질문하기</button>
        <button class="outline-btn">✏️ 묵상 노트 쓰기</button>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab active"><span>📖</span><span>오늘 QT</span></div>
      <div class="tab"><span>📚</span><span>성경</span></div>
      <div class="tab"><span>📝</span><span>노트</span></div>
      <div class="tab"><span>👤</span><span>나</span></div>
    </div>
  </div>
</body>
</html>
