<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>QT-AI Mockup · AI 대화</title>
  <link rel="stylesheet" href="_styles.css">
</head>
<body>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span>📶 100%</span></div>
    <div class="app-bar">
      <button class="icon-btn">←</button>
      <h1>AI 묵상 도우미</h1>
      <span style="font-size: 11px; color: var(--text-muted);">창세기 1:1</span>
    </div>
    <div class="body" style="display:flex; flex-direction: column; padding: 12px;">
      <div class="bubble-ai">
        본문은 "태초에 하나님이 천지를 창조하시니라"입니다. <br>본문에서 무엇이 가장 먼저 마음에 닿았나요?
      </div>
      <div class="bubble-user">
        하나님이 모든 것의 시작이라는 점이 인상 깊었어요.
      </div>
      <div class="bubble-ai">
        '태초'라는 단어는 모든 일이 있기 전을 뜻합니다. 본문은 하나님의 행위가 가장 먼저였음을 선언합니다.
        <div style="margin-top: 8px;">
          <span class="chip">📖 해설 · GEN 1:1</span>
        </div>
      </div>
      <div class="bubble-ai" style="opacity: 0.6;">
        오늘 하루 가장 먼저 하나님을 떠올릴 수 있는 순간은 언제일까요?<span style="opacity: .4;">▎</span>
      </div>
    </div>
    <div class="chat-input-row">
      <input type="text" placeholder="본문에 대해 질문해보세요">
      <button class="send-btn">↑</button>
    </div>
  </div>
</body>
</html>
