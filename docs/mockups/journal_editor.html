<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>QT-AI Mockup · 묵상 노트</title>
  <link rel="stylesheet" href="_styles.css">
</head>
<body>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span>📶 100%</span></div>
    <div class="app-bar">
      <button class="icon-btn">←</button>
      <h1>묵상 노트</h1>
      <span class="auto-save">✓ 자동 저장됨</span>
    </div>
    <div class="body">
      <div class="passage-ref">창세기 1:1 · 2026-05-14</div>
      <p class="passage-kr" style="font-size: 16px;">태초에 하나님이 천지를 창조하시니라</p>

      <div class="section-title">느낀 점</div>
      <textarea class="input-field" rows="3" placeholder="본문에서 느낀 점을 자유롭게 적어보세요">하나님이 세상의 시작이라는 사실이 새삼 든든하게 다가왔다.</textarea>

      <div class="section-title">마음에 남는 구절</div>
      <textarea class="input-field" rows="2" placeholder="기억하고 싶은 한 구절을 적어보세요"></textarea>

      <div class="section-title">적용 / 결단</div>
      <textarea class="input-field" rows="3" placeholder="오늘 하루 어떻게 적용할까요?"></textarea>

      <div class="section-title">기도</div>
      <textarea class="input-field" rows="3" placeholder="하나님께 드리는 짧은 기도"></textarea>

      <div style="margin-top: 24px;">
        <div class="section-title">AI 요약 (묵상 완료 후)</div>
        <div class="card" style="color: var(--text-muted); font-style: italic;">
          AI 세션을 완료하면 여기에 요약이 자동으로 첨부됩니다.
        </div>
      </div>
    </div>
  </div>
</body>
</html>
