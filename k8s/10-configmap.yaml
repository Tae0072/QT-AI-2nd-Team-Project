# 공유 비밀-아님 설정. 비밀값(비밀번호/JWT 키/API 키)은 Secret(15-secret)에서 주입한다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: qtai-config
  namespace: qtai
data:
  SPRING_PROFILES_ACTIVE: "docker"
  # 단일 DB(qtai) — 클러스터 내부 mysql Service 이름으로 접속
  DB_URL: "jdbc:mysql://mysql:3306/qtai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
  DB_USERNAME: "qtai"
  MYSQL_DATABASE: "qtai"
  # 로컬은 엔티티에서 스키마 생성(update). 운영 기본은 validate.
  JPA_DDL_AUTO: "update"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  KAKAO_USER_INFO_URL: "https://kapi.kakao.com/v2/user/me"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  MUSIC_SEED_ENABLED: "false"
  QT_SNAPSHOT_ENABLED: "false"
  QT_SNAPSHOT_STORAGE: "local"
  AI_SCHEDULING_ENABLED: "false"
