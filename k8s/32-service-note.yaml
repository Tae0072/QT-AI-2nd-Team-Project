# service-note (8083) — 노트/나눔/신고. 공개키로 검증만(개인키 미주입).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-note
  namespace: qtai
  labels:
    app: service-note
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-note
  template:
    metadata:
      labels:
        app: service-note
    spec:
      containers:
        - name: service-note
          image: qtai/service-note:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef: { name: qtai-config }
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: qtai-secret, key: DB_PASSWORD } }
            - name: SECURITY_JWT_PUBLIC_KEY
              valueFrom: { secretKeyRef: { name: qtai-secret, key: JWT_PUBLIC_KEY } }
          readinessProbe:
            tcpSocket: { port: 8083 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket: { port: 8083 }
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: { cpu: "150m", memory: "384Mi" }
            limits: { memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: service-note
  namespace: qtai
spec:
  type: NodePort
  selector:
    app: service-note
  ports:
    - port: 8083
      targetPort: 8083
      nodePort: 30083       # http://localhost:30083
