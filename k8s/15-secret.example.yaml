# =============================================================================
# Secret 템플릿 (예시) — 평문 키/비밀번호를 커밋하지 않기 위한 placeholder.
#
# ⚠️ 이 파일을 그대로 apply 하지 말 것. 아래 둘 중 하나로 "실제" Secret을 만든다.
#   (A) 스크립트:  ./k8s/scripts/generate-secret.ps1   (또는 generate-secret.sh)
#        → RS256 키 생성 + 비밀번호 입력받아 클러스터에 Secret 직접 생성(파일 미저장).
#   (B) 수동:      이 파일을 k8s/secret.local.yaml 로 복사(.gitignore됨)해 값 채우고 apply.
#
# JWT_PRIVATE_KEY / JWT_PUBLIC_KEY 는 Base64(DER) 문자열(.env와 동일 형식).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: qtai-secret
  namespace: qtai
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME_db_password"
  MYSQL_ROOT_PASSWORD: "REPLACE_ME_root_password"
  # service-user(발급)만 사용하는 개인키. 다른 서비스에는 주입하지 않는다.
  JWT_PRIVATE_KEY: "REPLACE_ME_base64_pkcs8_private_key"
  # 모든 서비스가 검증에 사용하는 공개키.
  JWT_PUBLIC_KEY: "REPLACE_ME_base64_x509_public_key"
  # 서비스 간 시스템 호출용 공유 HS256 시크릿(32바이트 이상). 모든 서비스에 동일 주입.
  SECURITY_JWT_SYSTEM_SECRET: "REPLACE_ME_hs256_system_secret_min_32_bytes"
  # 선택: DeepSeek API key (미설정 시 빈 값)
  DEEPSEEK_API_KEY: ""
