# 단일 MySQL 8.0 — 모든 서비스가 공유하는 qtai DB (도메인 테이블로 구분)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: qtai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: qtai
  labels:
    app: mysql
spec:
  replicas: 1
  strategy:
    type: Recreate            # 단일 PVC라 롤링 대신 재생성
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          env:
            - name: MYSQL_DATABASE
              valueFrom: { configMapKeyRef: { name: qtai-config, key: MYSQL_DATABASE } }
            - name: MYSQL_USER
              valueFrom: { configMapKeyRef: { name: qtai-config, key: DB_USERNAME } }
            - name: MYSQL_PASSWORD
              valueFrom: { secretKeyRef: { name: qtai-secret, key: DB_PASSWORD } }
            - name: MYSQL_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: qtai-secret, key: MYSQL_ROOT_PASSWORD } }
            - name: TZ
              value: Asia/Seoul
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -u root -p$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket: { port: 3306 }
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits: { memory: "1Gi" }
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: qtai
spec:
  type: ClusterIP            # 내부 전용
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
