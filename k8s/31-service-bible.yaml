# service-bible (8082) — 읽기전용 콘텐츠. 공개키로 검증만(개인키 미주입).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-bible
  namespace: qtai
  labels:
    app: service-bible
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-bible
  template:
    metadata:
      labels:
        app: service-bible
    spec:
      containers:
        - name: service-bible
          image: qtai/service-bible:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef: { name: qtai-config }
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: qtai-secret, key: DB_PASSWORD } }
            # 공개키만 주입 → lib-common JWT 검증 필터 활성화(relaxed binding)
            - name: SECURITY_JWT_PUBLIC_KEY
              valueFrom: { secretKeyRef: { name: qtai-secret, key: JWT_PUBLIC_KEY } }
            - name: SECURITY_JWT_SYSTEM_SECRET
              valueFrom: { secretKeyRef: { name: qtai-secret, key: SECURITY_JWT_SYSTEM_SECRET } }
          readinessProbe:
            tcpSocket: { port: 8082 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket: { port: 8082 }
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: { cpu: "150m", memory: "384Mi" }
            limits: { memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: service-bible
  namespace: qtai
spec:
  type: NodePort
  selector:
    app: service-bible
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30082       # http://localhost:30082
