# service-user (8081) — JWT 발급 주체. 개인키(JWT_PRIVATE_KEY)는 이 서비스에만 주입한다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-user
  namespace: qtai
  labels:
    app: service-user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-user
  template:
    metadata:
      labels:
        app: service-user
    spec:
      containers:
        - name: service-user
          image: qtai/service-user:local
          imagePullPolicy: IfNotPresent     # Docker Desktop k8s: 로컬 빌드 이미지 그대로 사용
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef: { name: qtai-config }
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: qtai-secret, key: DB_PASSWORD } }
            # 발급(개인키) + 검증(공개키) 둘 다 필요
            - name: JWT_PRIVATE_KEY
              valueFrom: { secretKeyRef: { name: qtai-secret, key: JWT_PRIVATE_KEY } }
            - name: JWT_PUBLIC_KEY
              valueFrom: { secretKeyRef: { name: qtai-secret, key: JWT_PUBLIC_KEY } }
          readinessProbe:
            tcpSocket: { port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket: { port: 8081 }
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests: { cpu: "150m", memory: "384Mi" }
            limits: { memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: service-user
  namespace: qtai
spec:
  type: NodePort
  selector:
    app: service-user
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081       # http://localhost:30081
