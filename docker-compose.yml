# QT-AI 시연/통합 스택 — 앱 + MySQL + Redis를 한 번에 기동한다.
#
# 실행:
#   1) cp .env.example .env  (JWT 키 채우기 — 테스트 키는 qtai-server/src/test/resources/application.yml 참조)
#   2) docker compose up --build
#   3) 앱이 MySQL(healthy)을 기다린 뒤 dev 프로파일로 기동. http://localhost:8080
#
# 인프라만 띄우려면: docker compose up -d mysql redis
services:
  mysql:
    image: mysql:8.0
    container_name: qtai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qtai
      MYSQL_USER: qtai
      MYSQL_PASSWORD: qtai
    ports:
      - "3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: qtai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data

  qtai-server:
    build:
      context: ./qtai-server
    image: qtai-server:local
    container_name: qtai-server
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 실DB 연결 — dev 프로파일(application-dev.yml: MySQL + dev-bypass)
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: "jdbc:mysql://mysql:3306/qtai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
      DB_USERNAME: qtai
      DB_PASSWORD: qtai
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    # JWT_PRIVATE_KEY / JWT_PUBLIC_KEY 등 비밀값은 .env에서 주입(레포에 평문 금지)
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080"

volumes:
  mysql-data:
  redis-data:
