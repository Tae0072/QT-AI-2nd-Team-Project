version: 2
updates:
  # Gradle (qtai-server 백엔드)
  - package-ecosystem: gradle
    directory: /qtai-server
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps)"

  # Flutter (flutter-app)
  - package-ecosystem: pub
    directory: /flutter-app
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - flutter
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions 워크플로 의존성
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - infra
    commit-message:
      prefix: "chore(ci)"
