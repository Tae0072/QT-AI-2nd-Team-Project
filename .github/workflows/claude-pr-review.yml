name: Claude PR Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: get_diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          # 파일 크기 제한 (너무 크면 API 오류)
          head -c 10000 pr_diff.txt > pr_diff_limited.txt
          DIFF_CONTENT=$(cat pr_diff_limited.txt | base64 -w 0)
          echo "diff_b64=${DIFF_CONTENT}" >> $GITHUB_OUTPUT

      - name: Claude Code Review
        id: claude_review
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const diffB64 = '${{ steps.get_diff.outputs.diff_b64 }}';
            const diff = Buffer.from(diffB64, 'base64').toString('utf-8');

            const prompt = `당신은 숙련된 시니어 백엔드 개발자입니다. 아래 PR diff를 분석하여 코드 리뷰를 진행해주세요.

            ## 리뷰 기준
            1. **코드 품질**: 가독성, 네이밍, 중복 코드
            2. **버그 가능성**: NPE, 인덱스 오류, 예외 처리 누락
            3. **보안**: 하드코딩된 시크릿, SQL Injection, 권한 검증 누락
            4. **Spring Boot 3.x 호환성**: deprecated API 사용 여부
            5. **트랜잭션**: @Transactional 누락, 범위 오류
            6. **MSA 주의사항**: Kafka 이벤트 페어, API 호출 타임아웃, 서비스 의존성
            7. **도메인 로직**: 성경 묵상 세션 흐름, AI 코칭 턴 처리, 묵상 노트 생성 로직의 정확성

            ## 응답 형식
            리뷰 내용을 한국어로 작성하고, 마지막 줄에 반드시 다음 중 하나만 출력:
            - 문제 없음: APPROVE
            - 수정 필요: REQUEST_CHANGES

            ## PR Diff
            ${diff}`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 2000,
                messages: [{ role: 'user', content: prompt }]
              })
            });

            if (!response.ok) {
              const err = await response.text();
              throw new Error(`Claude API 오류: ${err}`);
            }

            const data = await response.json();
            const reviewText = data.content[0].text;

            // APPROVE / REQUEST_CHANGES 판단
            const decision = reviewText.includes('APPROVE') ? 'APPROVE' : 'REQUEST_CHANGES';

            console.log('=== Claude 리뷰 결과 ===');
            console.log(reviewText);
            console.log('결정:', decision);

            // PR에 리뷰 등록
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: `## 🤖 Claude 자동 코드 리뷰\n\n${reviewText}`,
              event: decision
            });

            // decision을 다음 step으로 전달
            core.setOutput('decision', decision);

      # -----------------------------------------------------------------------
      # CI 통과 확인 후 머지 (Claude APPROVE인 경우에만 실행)
      # ci.yml 3개 job (spring-build, flutter-test, decisions-guard)이
      # 모두 success여야 squash merge 진행
      # -----------------------------------------------------------------------
      - name: Wait for CI & Auto Merge
        if: steps.claude_review.outputs.decision == 'APPROVE'
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_WAIT_MS    = 10 * 60 * 1000;  // 최대 10분 대기
            const POLL_INTERVAL  = 15 * 1000;        // 15초 간격 폴링
            const THIS_JOB_NAME  = 'Claude PR Auto Review';

            const sha = context.payload.pull_request.head.sha;
            const prNumber = context.payload.pull_request.number;
            const repoInfo = { owner: context.repo.owner, repo: context.repo.repo };

            const startTime = Date.now();

            while (Date.now() - startTime < MAX_WAIT_MS) {
              const { data: { check_runs } } = await github.rest.checks.listForRef({
                ...repoInfo,
                ref: sha,
              });

              // 현재 Claude 리뷰 job은 제외하고 CI job만 판별
              const ciChecks = check_runs.filter(r => r.name !== THIS_JOB_NAME);

              if (ciChecks.length === 0) {
                console.log('CI 체크 아직 등록되지 않음, 대기 중...');
                await new Promise(r => setTimeout(r, POLL_INTERVAL));
                continue;
              }

              const pending = ciChecks.filter(r => r.status !== 'completed');
              if (pending.length > 0) {
                console.log(`CI 완료 대기 중: ${pending.map(r => r.name).join(', ')}`);
                await new Promise(r => setTimeout(r, POLL_INTERVAL));
                continue;
              }

              // 전체 완료 — 실패 여부 확인
              const failed = ciChecks.filter(r => r.conclusion !== 'success');
              if (failed.length > 0) {
                const failList = failed.map(r => `\`${r.name}\` (${r.conclusion})`).join(', ');
                console.log(`CI 실패 항목 있음 — 자동 머지 취소: ${failList}`);
                await github.rest.issues.createComment({
                  ...repoInfo,
                  issue_number: prNumber,
                  body: [
                    '## ⛔ 자동 머지 취소',
                    '',
                    'Claude 리뷰는 **APPROVE**이나, 아래 CI 체크가 실패하여 머지하지 않습니다.',
                    '',
                    `**실패 항목:** ${failList}`,
                    '',
                    '오류를 수정한 뒤 다시 push해주세요.',
                  ].join('\n')
                });
                return;
              }

              // 전체 success → squash merge
              console.log('CI 전체 통과 — 자동 squash merge 진행');
              await github.rest.pulls.merge({
                ...repoInfo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log('머지 완료');
              return;
            }

            // 10분 타임아웃
            console.log('CI 대기 타임아웃 (10분) — 자동 머지 건너뜀');
            await github.rest.issues.createComment({
              ...repoInfo,
              issue_number: prNumber,
              body: [
                '## ⏱️ 자동 머지 타임아웃',
                '',
                'CI 체크가 **10분** 내 완료되지 않아 자동 머지를 건너뜁니다.',
                '직접 CI 결과를 확인한 뒤 머지해주세요.',
              ].join('\n')
            });
