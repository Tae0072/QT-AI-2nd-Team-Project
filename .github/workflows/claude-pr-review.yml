name: Claude PR Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: get_diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          # 파일 크기 제한 (너무 크면 API 오류)
          head -c 10000 pr_diff.txt > pr_diff_limited.txt
          DIFF_CONTENT=$(cat pr_diff_limited.txt | base64 -w 0)
          echo "diff_b64=${DIFF_CONTENT}" >> $GITHUB_OUTPUT

      - name: Claude Code Review
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const diffB64 = '${{ steps.get_diff.outputs.diff_b64 }}';
            const diff = Buffer.from(diffB64, 'base64').toString('utf-8');

            const prompt = `당신은 숙련된 시니어 백엔드 개발자입니다. 아래 PR diff를 분석하여 코드 리뷰를 진행해주세요.

            ## 리뷰 기준
            1. **코드 품질**: 가독성, 네이밍, 중복 코드
            2. **버그 가능성**: NPE, 인덱스 오류, 예외 처리 누락
            3. **보안**: 하드코딩된 시크릿, SQL Injection, 권한 검증 누락
            4. **Spring Boot 3.x 호환성**: deprecated API 사용 여부
            5. **트랜잭션**: @Transactional 누락, 범위 오류
            6. **MSA 주의사항**: Kafka 이벤트 페어, API 호출 타임아웃, 서비스 의존성
            7. **도메인 로직**: 성경 묵상 세션 흐름, AI 코칭 턴 처리, 묵상 노트 생성 로직의 정확성

            ## 응답 형식
            리뷰 내용을 한국어로 작성하고, 마지막 줄에 반드시 다음 중 하나만 출력:
            - 문제 없음: APPROVE
            - 수정 필요: REQUEST_CHANGES

            ## PR Diff
            ${diff}`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 2000,
                messages: [{ role: 'user', content: prompt }]
              })
            });

            if (!response.ok) {
              const err = await response.text();
              throw new Error(`Claude API 오류: ${err}`);
            }

            const data = await response.json();
            const reviewText = data.content[0].text;

            // APPROVE / REQUEST_CHANGES 판단
            const decision = reviewText.includes('APPROVE') ? 'APPROVE' : 'REQUEST_CHANGES';

            console.log('=== Claude 리뷰 결과 ===');
            console.log(reviewText);
            console.log('결정:', decision);

            // PR에 리뷰 등록
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: `## 🤖 Claude 자동 코드 리뷰\n\n${reviewText}`,
              event: decision
            });
            // APPROVE인 경우에만 자동 머지 (CI도 통과한 경우)
            if (decision === 'APPROVE') {
              // Branch protection rule에서 required checks가 통과한 경우에만 머지
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                merge_method: 'squash'
              });
            }
