name: Claude PR Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ dev ]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | head -c 10000 > pr_diff.txt

      - name: Claude PR Review
        id: claude_review
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: 10
          prompt: |
            pr_diff.txt 파일을 읽어 시니어 백엔드 개발자로서 한국어로 코드 리뷰를 작성하세요.

            ## 리뷰 기준
            1. 코드 품질: 가독성, 네이밍, 중복 코드
            2. 버그 가능성: NPE, 인덱스 오류, 예외 처리 누락
            3. 보안: 하드코딩된 시크릿, SQL Injection, 권한 검증 누락
            4. Spring Boot 3.x 호환성: deprecated API 사용 여부
            5. 트랜잭션: @Transactional 누락, 범위 오류
            6. MSA 주의사항: Kafka 이벤트 페어, API 호출 타임아웃, 서비스 의존성
            7. 도메인 로직: 성경 묵상 세션 흐름, AI 코칭 턴 처리, 묵상 노트 생성 로직의 정확성

            리뷰 내용을 모두 작성한 뒤, **마지막 줄**에 다른 텍스트 없이 다음 중 하나만 출력하세요:
            APPROVE
            REQUEST_CHANGES

      - name: Post Review & Auto Merge
        if: always()
        uses: actions/github-script@v7
        env:
          # RUNNER_TEMP를 명시적으로 전달 (claude-execution-output.json 경로용)
          CLAUDE_OUTPUT_FILE: ${{ runner.temp }}/claude-execution-output.json
        with:
          script: |
            const fs = require('fs');

            // claude-code-base-action 결과를 JSON 파일에서 읽기
            let reviewText = '';
            const outputFile = process.env.CLAUDE_OUTPUT_FILE;
            console.log('JSON 파일 경로:', outputFile);

            try {
              const raw = fs.readFileSync(outputFile, 'utf8');
              const data = JSON.parse(raw);
              reviewText = data.result || '';
              console.log('=== JSON 읽기 성공, 길이:', reviewText.length, '===');
            } catch(e) {
              console.log('JSON 읽기 실패:', e.message);
            }

            if (!reviewText) {
              console.log('리뷰 출력 없음 — 워크플로우 로그를 확인하세요.');
              return;
            }

            // 마지막 줄에서 APPROVE / REQUEST_CHANGES 판별
            const lines = reviewText.trim().split('\n');
            const lastLine = lines[lines.length - 1].trim();
            const decision = lastLine === 'APPROVE' ? 'APPROVE' : 'REQUEST_CHANGES';

            console.log('=== 판정:', decision, '===');

            const repoInfo = { owner: context.repo.owner, repo: context.repo.repo };
            const prNumber = context.payload.pull_request.number;

            // PR에 리뷰 코멘트 등록
            await github.rest.pulls.createReview({
              ...repoInfo,
              pull_number: prNumber,
              body: `## 🤖 Claude 자동 코드 리뷰\n\n${reviewText}`,
              event: decision
            });
            console.log('리뷰 등록 완료:', decision);

            if (decision !== 'APPROVE') {
              console.log('REQUEST_CHANGES — 자동 머지 건너뜀');
              return;
            }

            // APPROVE: CI 완료까지 최대 10분 폴링 후 squash merge → dev
            const MAX_WAIT_MS   = 10 * 60 * 1000;
            const POLL_INTERVAL = 15 * 1000;
            // 실제 job 이름 (YAML jobs: 아래 key)
            const THIS_JOB_NAME = 'claude-review';
            const sha = context.payload.pull_request.head.sha;
            const startTime = Date.now();

            console.log('CI 완료 대기 시작, SHA:', sha);

            while (Date.now() - startTime < MAX_WAIT_MS) {
              const { data: { check_runs } } = await github.rest.checks.listForRef({
                ...repoInfo,
                ref: sha,
              });

              // 현재 claude-review job 제외하고 나머지 CI job만 확인
              const ciChecks = check_runs.filter(r => r.name !== THIS_JOB_NAME);
              console.log('CI 체크 목록:', ciChecks.map(r => `${r.name}(${r.status}/${r.conclusion})`).join(', ') || '없음');

              if (ciChecks.length === 0) {
                console.log('CI 체크 없음 — 15초 후 재확인');
                await new Promise(r => setTimeout(r, POLL_INTERVAL));
                continue;
              }

              const pending = ciChecks.filter(r => r.status !== 'completed');
              if (pending.length > 0) {
                console.log(`CI 완료 대기 중: ${pending.map(r => r.name).join(', ')}`);
                await new Promise(r => setTimeout(r, POLL_INTERVAL));
                continue;
              }

              const failed = ciChecks.filter(r => r.conclusion !== 'success');
              if (failed.length > 0) {
                const failList = failed.map(r => `\`${r.name}\` (${r.conclusion})`).join(', ');
                await github.rest.issues.createComment({
                  ...repoInfo,
                  issue_number: prNumber,
                  body: [
                    '## ⛔ 자동 머지 취소',
                    '',
                    'Claude 리뷰는 **APPROVE**이나, 아래 CI 체크가 실패하여 머지하지 않습니다.',
                    '',
                    `**실패 항목:** ${failList}`,
                    '',
                    '오류를 수정한 뒤 다시 push해주세요.',
                  ].join('\n')
                });
                return;
              }

              console.log('CI 전체 통과 — squash merge → dev 진행');
              await github.rest.pulls.merge({
                ...repoInfo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log('✅ 머지 완료 → dev');
              return;
            }

            await github.rest.issues.createComment({
              ...repoInfo,
              issue_number: prNumber,
              body: [
                '## ⏱️ 자동 머지 타임아웃',
                '',
                'CI 체크가 **10분** 내 완료되지 않아 자동 머지를 건너뜁니다.',
                '직접 CI 결과를 확인한 뒤 머지해주세요.',
              ].join('\n')
            });
