name: Claude PR Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # 팀원 PR 대상: dev 브랜치만 자동 리뷰 + 머지
    # dev → master PR은 Lead(강태오)가 직접 수동 머지
    branches: [ dev ]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PR diff를 GitHub Output으로 저장 → 프롬프트에 직접 삽입
      - name: Get PR diff
        id: get_diff
        run: |
          {
            echo 'diff_content<<__DIFF_EOF__'
            git diff origin/${{ github.base_ref }}...HEAD | head -c 8000
            echo '__DIFF_EOF__'
          } >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Claude 구독(OAuth) 방식으로 코드 리뷰
      # diff를 프롬프트에 직접 삽입 → bash 도구 불필요
      # timeout_minutes: 10 으로 충분한 응답 시간 확보
      # -----------------------------------------------------------------------
      - name: Claude PR Review
        id: claude_review
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: 10
          prompt: |
            당신은 숙련된 시니어 백엔드 개발자입니다.
            아래 PR diff를 분석하여 한국어로 코드 리뷰를 작성하세요.

            ## 리뷰 기준
            1. 코드 품질: 가독성, 네이밍, 중복 코드
            2. 버그 가능성: NPE, 인덱스 오류, 예외 처리 누락
            3. 보안: 하드코딩된 시크릿, SQL Injection, 권한 검증 누락
            4. Spring Boot 3.x 호환성: deprecated API 사용 여부
            5. 트랜잭션: @Transactional 누락, 범위 오류
            6. MSA 주의사항: Kafka 이벤트 페어, API 호출 타임아웃, 서비스 의존성
            7. 도메인 로직: 성경 묵상 세션 흐름, AI 코칭 턴 처리, 묵상 노트 생성 로직의 정확성

            리뷰 내용을 모두 작성한 뒤, **마지막 줄**에 다른 텍스트 없이 다음 중 하나만 출력하세요:
            APPROVE
            REQUEST_CHANGES

            ## PR Diff
            ${{ steps.get_diff.outputs.diff_content }}

      # -----------------------------------------------------------------------
      # 리뷰 결과 PR에 등록 + APPROVE 시 CI 완료 확인 후 squash merge → dev
      # -----------------------------------------------------------------------
      - name: Post Review & Auto Merge
        if: always()
        uses: actions/github-script@v7
        env:
          REVIEW_OUTPUT: ${{ steps.claude_review.outputs.output }}
        with:
          script: |
            const reviewText = process.env.REVIEW_OUTPUT || '';

            if (!reviewText) {
              console.log('Claude 리뷰 출력 없음 — CLAUDE_CODE_OAUTH_TOKEN 시크릿 또는 액션 로그를 확인하세요.');
              return;
            }

            const lines = reviewText.trim().split('\n');
            const lastLine = lines[lines.length - 1].trim();
            const decision = lastLine === 'APPROVE' ? 'APPROVE' : 'REQUEST_CHANGES';

            console.log('=== Claude 리뷰 결과 ===');
            console.log(reviewText);
            console.log('결정:', decision);

            const repoInfo = { owner: context.repo.owner, repo: context.repo.repo };
            const prNumber = context.payload.pull_request.number;

            await github.rest.pulls.createReview({
              ...repoInfo,
              pull_number: prNumber,
              body: `## 🤖 Claude 자동 코드 리뷰\n\n${reviewText}`,
              event: decision
            });

            if (decision !== 'APPROVE') {
              console.log('REQUEST_CHANGES — 자동 머지 건너뜀');
              return;
            }

            // APPROVE: CI 완료까지 최대 10분 폴링 후 squash merge → dev
            const MAX_WAIT_MS   = 10 * 60 * 1000;
            const POLL_INTERVAL = 15 * 1000;
            const THIS_JOB_NAME = 'Claude PR Auto Review';
            const sha = context.payload.pull_request.head.sha;
            const startTime = Date.now();

            while (Date.now() - startTime < MAX_WAIT_MS) {
              const { data: { check_runs } } = await github.rest.checks.listForRef({
                ...repoInfo,
                ref: sha,
              });

              const ciChecks = check_runs.filter(r => r.name !== THIS_JOB_NAME);

              if (ciChecks.length === 0) {
                await new Promise(r => setTimeout(r, POLL_INTERVAL));
                continue;
              }

              const pending = ciChecks.filter(r => r.status !== 'completed');
              if (pending.length > 0) {
                console.log(`CI 완료 대기 중: ${pending.map(r => r.name).join(', ')}`);
                await new Promise(r => setTimeout(r, POLL_INTERVAL));
                continue;
              }

              const failed = ciChecks.filter(r => r.conclusion !== 'success');
              if (failed.length > 0) {
                const failList = failed.map(r => `\`${r.name}\` (${r.conclusion})`).join(', ');
                await github.rest.issues.createComment({
                  ...repoInfo,
                  issue_number: prNumber,
                  body: [
                    '## ⛔ 자동 머지 취소',
                    '',
                    'Claude 리뷰는 **APPROVE**이나, 아래 CI 체크가 실패하여 머지하지 않습니다.',
                    '',
                    `**실패 항목:** ${failList}`,
                    '',
                    '오류를 수정한 뒤 다시 push해주세요.',
                  ].join('\n')
                });
                return;
              }

              console.log('CI 전체 통과 — 자동 squash merge → dev 진행');
              await github.rest.pulls.merge({
                ...repoInfo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log('머지 완료 → dev');
              return;
            }

            await github.rest.issues.createComment({
              ...repoInfo,
              issue_number: prNumber,
              body: [
                '## ⏱️ 자동 머지 타임아웃',
                '',
                'CI 체크가 **10분** 내 완료되지 않아 자동 머지를 건너뜁니다.',
                '직접 CI 결과를 확인한 뒤 머지해주세요.',
              ].join('\n')
            });
