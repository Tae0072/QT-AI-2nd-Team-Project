name: Claude PR Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ dev ]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | head -c 10000 > pr_diff.txt

      - name: Claude PR Review
        id: claude_review
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: 10
          prompt: |
            pr_diff.txt 파일을 읽어 시니어 백엔드 개발자로서 한국어로 코드 리뷰를 작성하세요.

            ## 리뷰 기준
            1. 코드 품질: 가독성, 네이밍, 중복 코드
            2. 버그 가능성: NPE, 인덱스 오류, 예외 처리 누락
            3. 보안: 하드코딩된 시크릿, SQL Injection, 권한 검증 누락
            4. Spring Boot 3.x 호환성: deprecated API 사용 여부
            5. 트랜잭션: @Transactional 누락, 범위 오류
            6. MSA 주의사항: Kafka 이벤트 페어, API 호출 타임아웃, 서비스 의존성
            7. 도메인 로직: 성경 묵상 세션 흐름, AI 코칭 턴 처리, 묵상 노트 생성 로직의 정확성

            ## 테스트 코드 필수 조건 (중요!)
            - feat / fix / refactor 타입 PR은 단위 테스트(Unit Test) 코드가 반드시 PR에 포함되어야 합니다.
            - 통합 테스트(Integration Test)가 포함되거나, 미포함 사유가 PR 본문에 명시되어야 합니다.
            - "다음 PR에서 추가 예정" 이라는 사유만으로는 APPROVE 불가 — REQUEST_CHANGES를 내리세요.
            - 테스트가 존재하더라도 핵심 로직(Service, UseCase)에 대한 테스트가 없으면 REQUEST_CHANGES.
            - docs / chore 타입은 테스트 불필요.

            리뷰 내용을 모두 작성한 뒤, 마지막 줄에 다른 텍스트 없이 다음 중 하나만 출력하세요:
            APPROVE
            REQUEST_CHANGES

      - name: Post Review & Auto Merge
        if: always()
        uses: actions/github-script@v7
        env:
          CLAUDE_OUTPUT_FILE: ${{ runner.temp }}/claude-execution-output.json
        with:
          script: |
            const fs = require('fs');
            const outputFile = process.env.CLAUDE_OUTPUT_FILE;

            let reviewText = '';
            try {
              const raw = fs.readFileSync(outputFile, 'utf8');
              const data = JSON.parse(raw);
              if (Array.isArray(data)) {
                const found = data.find(function(item) { return item.type === 'result'; });
                reviewText = found ? (found.result || found.output || '') : '';
              } else {
                reviewText = data.result || data.output || '';
              }
              console.log('reviewText length:', reviewText.length);
            } catch(e) {
              console.log('JSON read error:', e.message);
            }

            if (!reviewText) {
              console.log('No review output');
              return;
            }

            const lines = reviewText.trim().split('\n');
            const lastLine = lines[lines.length - 1].trim();
            const decision = lastLine === 'APPROVE' ? 'APPROVE' : 'REQUEST_CHANGES';
            console.log('Decision:', decision);

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            await github.rest.pulls.createReview({
              owner: owner,
              repo: repo,
              pull_number: prNumber,
              body: '## 🤖 Claude 자동 코드 리뷰\n\n' + reviewText,
              event: decision
            });
            console.log('Review posted:', decision);

            if (decision !== 'APPROVE') return;

            const MAX_WAIT_MS = 10 * 60 * 1000;
            const POLL_INTERVAL = 15 * 1000;
            const THIS_JOB = 'claude-review';
            const sha = context.payload.pull_request.head.sha;
            const start = Date.now();

            while (Date.now() - start < MAX_WAIT_MS) {
              const resp = await github.rest.checks.listForRef({ owner: owner, repo: repo, ref: sha });
              const ciChecks = resp.data.check_runs.filter(function(r) { return r.name !== THIS_JOB; });
              const names = ciChecks.map(function(r) { return r.name + '(' + (r.conclusion || r.status) + ')'; }).join(', ');
              console.log('CI checks:', names || 'none');

              if (ciChecks.length === 0) {
                await new Promise(function(res) { setTimeout(res, POLL_INTERVAL); });
                continue;
              }
              if (ciChecks.some(function(r) { return r.status !== 'completed'; })) {
                await new Promise(function(res) { setTimeout(res, POLL_INTERVAL); });
                continue;
              }
              const failed = ciChecks.filter(function(r) { return r.conclusion !== 'success'; });
              if (failed.length > 0) {
                const failNames = failed.map(function(r) { return r.name; }).join(', ');
                await github.rest.issues.createComment({
                  owner: owner, repo: repo, issue_number: prNumber,
                  body: '## ⛔ 자동 머지 취소\n\nCI 실패: ' + failNames + '\n\n수정 후 다시 push해주세요.'
                });
                return;
              }
              await github.rest.pulls.merge({ owner: owner, repo: repo, pull_number: prNumber, merge_method: 'squash' });
              console.log('Merged to dev');
              return;
            }

            await github.rest.issues.createComment({
              owner: owner, repo: repo, issue_number: prNumber,
              body: '## ⏱️ 자동 머지 타임아웃\n\nCI 10분 내 미완료 — 직접 확인 후 머지해주세요.'
            });