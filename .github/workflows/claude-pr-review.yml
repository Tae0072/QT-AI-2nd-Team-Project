name: Claude PR Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ dev ]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | head -c 10000 > pr_diff.txt

      - name: Claude PR Review
        id: claude_review
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: 10
          prompt: |
            pr_diff.txt 파일을 읽어 시니어 백엔드 개발자로서 한국어로 코드 리뷰를 작성하세요.

            ## 리뷰 기준
            1. 코드 품질: 가독성, 네이밍, 중복 코드
            2. 버그 가능성: NPE, 인덱스 오류, 예외 처리 누락
            3. 보안: 하드코딩된 시크릿, SQL Injection, 권한 검증 누락
            4. Spring Boot 3.x 호환성: deprecated API 사용 여부
            5. 트랜잭션: @Transactional 누락, 범위 오류
            6. MSA 주의사항: Kafka 이벤트 페어, API 호출 타임아웃, 서비스 의존성
            7. 도메인 로직: 성경 묵상 세션 흐름, AI 코칭 턴 처리, 묵상 노트 생성 로직의 정확성

            리뷰 내용을 모두 작성한 뒤, **마지막 줄**에 다른 텍스트 없이 다음 중 하나만 출력하세요:
            APPROVE
            REQUEST_CHANGES

      - name: Post Review & Auto Merge
        if: always()
        uses: actions/github-script@v7
        env:
          CLAUDE_OUTPUT_FILE: ${{ runner.temp }}/claude-execution-output.json
        with:
          script: |
            const fs = require('fs');

            let reviewText = '';
            const outputFile = process.env.CLAUDE_OUTPUT_FILE;

            try {
              const raw = fs.readFileSync(outputFile, 'utf8');
              const data = JSON.parse(raw);

              // JSON이 배열인 경우: type === 'result' 항목에서 추출
              if (Array.isArray(data)) {
                const resultItem = data.find(item => item.type === 'result');
                reviewText = resultItem
                  ? (resultItem.result || resultItem.output || resultItem.text || '')
                  : '';
                console.log('배열 파싱 — resultItem 타입:', resultItem ? resultItem.type : 'not found');
              } else {
                // JSON이 객체인 경우 (이전 형식)
                reviewText = data.result || data.output || data.text || '';
              }

              console.log('reviewText 길이:', reviewText.length);
            } catch(e) {
              console.log('JSON 읽기 실패:', e.message);
            }

            if (!reviewText) {
              console.log('리뷰 출력 없음');
              return;
            }

            // 마지막 줄에서 APPROVE / REQUEST_CHANGES 판별
            const lines = reviewText.trim().split('\n');
            const lastLine = lines[lines.length - 1].trim();
            const decision = lastLine === 'APPROVE' ? 'APPROVE' : 'REQUEST_CHANGES';
            console.log('판정:', decision);

            const repoInfo = { owner: context.repo.owner, repo: context.repo.repo };
            const prNumber = context.payload.pull_request.number;

            await github.rest.pulls.createReview({
              ...repoInfo,
              pull_number: prNumber,
              body: `## 🤖 Claude 자동 코드 리뷰\n\n${reviewText}`,
              event: decision
            });
            console.log('리뷰 등록 완료:', decision);

            if (decision !== 'APPROVE') return;

            // APPROVE → CI 폴링 후 squash merge → dev
            const MAX_WAIT_MS   = 10 * 60 * 1000;
            const POLL_INTERVAL = 15 * 1000;
            const THIS_JOB_NAME = 'claude-review';
            const sha = context.payload.pull_request.head.sha;
            const startTime = Date.now();

            while (Date.now() - startTime < MAX_WAIT_MS) {
              const { data: { check_runs } } = await github.rest.checks.listForRef({
                ...repoInfo, ref: sha,
              });
              const ciChecks = check_runs.filter(r => r.name !== THIS_JOB_NAME);
              console.log('CI 체크:', ciChecks.map(r => `${r.name}(${r.conclusion || r.status})`).join(', ') || '없음');

              if (ciChecks.length === 0) {
                await new Promise(r => setTimeout(r, POLL_INTERVAL)); continue;
              }
              if (ciChecks.some(r => r.status !== 'completed')) {
                await new Promise(r => setTimeout(r, POLL_INTERVAL)); continue;
              }
              const failed = ciChecks.filter(r => r.conclusion !== 'success');
              if (failed.length > 0) {
                await github.rest.issues.createComment({
                  ...repoInfo, issue_number: prNumber,
                  body: `## ⛔ 자동 머지 취소\n\nCI 실패: ${failed.map(r=>`\`${r.name}\``).join(', ')}\n\n수정 후 다시 push해주세요.`
                });
                return;
              }
              await github.rest.pulls.merge({ ...repoInfo, pull_number: prNumber, merge_method: 'squash' });
              console.log('✅ squash merge → dev 완료');
              return;
            }

            await github.rest.issues.createComment({
              ...repoInfo, issue_number: prNumber,
              body: '## ⏱️ 자동 머지 타임아웃\n\nCI 10분 내 미완료 — 직접 확인 후 머지해주세요.'
            });
