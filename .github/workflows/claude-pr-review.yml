name: Claude PR Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [dev]

# =============================================================================
# 환경변수 — 변경 가능 (한 곳만 수정하면 전체 반영)
# =============================================================================
# 정책: 코드 파일만 diff 추출, 크기 제한 없음.
#   - *.java *.kt *.dart *.gradle *.yml *.yaml *.properties *.xml *.md 만 추출한다.
#     (*.dart 누락 시 Flutter 전용 PR의 diff가 0바이트로 추출되어 리뷰 불가 — 2026-06-05 수정)
#   - 성경 시드 SQL/JSON 같은 대용량 비코드 데이터는 제외하여 컨텍스트 폭발 방지.
#   - 코드 파일 자체는 절단하지 않는다. 파일 기반 stdin 파이프로 ARG_MAX 우회.
#   - Claude CLI 실패(컨텍스트 초과, API 장애 등)는 PR 코멘트로 안내하며 step은 exit 0.
env:
  # Claude 모델 — 코드 리뷰는 Opus(추론력 우선) 권장.
  # 변경 시 이 env 변수만 수정 (예: claude-sonnet-4-6 로 다운그레이드 가능).
  ANTHROPIC_MODEL_NAME: claude-opus-4-7

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude PR Review
        id: claude_review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_MODEL: ${{ env.ANTHROPIC_MODEL_NAME }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Claude CLI 실패(컨텍스트 초과 등)가 step 자체를 fail로 만들지 않도록 설정.
          # 봇 리뷰는 ci-all 게이트에 포함되지 않으므로 항상 exit 0.
          set +e

          # ---------------------------------------------------------------
          # 1) 코드 파일만 diff 추출 — 시드 SQL/JSON/바이너리 제외
          #    대용량 시드 데이터(성경 등)가 diff를 9MB+ 로 불리는 것을 방지.
          #    검토 대상: Java·Kotlin·Gradle·YAML·Properties·XML·MD
          # ---------------------------------------------------------------
          DIFF_FILE=$(mktemp)
          PROMPT_FILE=$(mktemp)
          trap 'rm -f "$DIFF_FILE" "$PROMPT_FILE"' EXIT

          FULL_SIZE=$(git diff "origin/${BASE_REF}...HEAD" | wc -c)
          git diff "origin/${BASE_REF}...HEAD" -- \
            '*.java' '*.kt' '*.dart' '*.gradle' '*.gradle.kts' \
            '*.yml' '*.yaml' '*.properties' '*.xml' '*.md' \
            > "$DIFF_FILE"
          DIFF_SIZE=$(wc -c < "$DIFF_FILE")
          echo "=== 전체 diff: ${FULL_SIZE} bytes / 코드 파일 diff: ${DIFF_SIZE} bytes ==="

          # ---------------------------------------------------------------
          # 2) 프롬프트 헤더를 파일에 작성 (heredoc 사용 → bash 재해석 차단)
          #    인용된 <<'EOF' 형태라 ${...}, $(...), `...` 모두 리터럴.
          # ---------------------------------------------------------------
          cat > "$PROMPT_FILE" << 'PROMPT_HEADER_EOF'
          당신은 QT-AI 프로젝트의 시니어 백엔드 개발자입니다. 아래 PR diff를 분석하여 한국어로 코드 리뷰를 작성하세요.

          ## QT-AI 프로젝트 컨텍스트
          - 거버닝 SSoT: 07_요구사항_정의서.md v3.1 (충돌 우선순위: 07 > 03 > 04 > 18 > 23 > 09)
          - 백엔드: 단일 qtai-server Modular Monolith(v1) → v2 MSA 분리(2026-06-08) (Java 21 + MySQL 8.0 + Redis 7.x + Caffeine)
          - 13 도메인 패키지: com.qtai.domain.{member, bible, qt, study, note, sharing, report, notification, praise, mission, ai, admin, audit}
          - 인증: Kakao OAuth + JWT RS256 (Access 30분/Refresh 14일)
          - AI: DeepSeek API, 04:00 KST 배치/관리자 트리거 전용, F-15 단발 Q&A만 인라인(202 + polling)

          ## 리뷰 기준 (v3.1, 9개)

          1. **코드 품질**: 가독성, 네이밍 일관성, 중복 코드, 단일 책임 원칙

          2. **버그 가능성 + 예외 처리** (강화):
             - NPE / 인덱스 오류 / ConcurrentModification 등 일반 버그 패턴
             - 멱등성 키 누락 (예: 묵상 1일 1건 active_unique_key, 04:00 배치 재실행)
             - try-catch 누락 또는 광범위 catch(Exception e) 금지 — 구체적 예외만
             - 비즈니스 예외 분류: BusinessException → ErrorCode 매핑 (04 API 명세서 ErrorCode 표준)
             - 외부 API 호출(DeepSeek, Kakao OAuth) 타임아웃·재시도·circuit breaker 처리
             - AI 배치 실패 시 폴백 (이전 캐시 cacheStatus=STALE_FALLBACK)

          3. **테스트 커버리지** (필수 — 누락 시 REQUEST_CHANGES):
             - 단위 테스트: 변경된 모든 public 메서드에 단위 테스트 존재 (JUnit5/AssertJ/Mockito)
             - 통합 테스트: Controller(MockMvc)·Repository·외부 연동(WireMock 등) 통합 테스트
             - 테스트 자체 통과: ./gradlew test 가 success 여야 머지 (CI ci.yml에서 별도 검증, 본 리뷰는 누락/품질 판정)
             - 예외 케이스 테스트: 정상 경로뿐 아니라 실패·차단·권한 부족 등 부정 경로 테스트 포함
             - 커버리지 KPI: Domain 70% / Application 70% / Presentation 50% / Infrastructure 40% / 전체 70%
             - 변경 대비 테스트 누락 시 PR 본문에 미작성 사유 필수 (예: 외부 OAuth Mock 한계)
             - docs / chore 타입은 면제

          4. **보안**:
             - 하드코딩된 시크릿 / 평문 토큰 / .env 커밋 금지
             - SQL Injection 방어: PreparedStatement / JPQL / QueryDSL 사용
             - 권한 8 role 검증 누락: ANONYMOUS/USER/ADMIN/OPERATOR/REVIEWER/CONTENT_CREATOR/SUPER_ADMIN/SYSTEM_BATCH
             - ADMIN role 단독으로 관리자 작업 허용 X (admin_users.admin_role 함께 검사)
             - JWT RS256 검증 누락 / Refresh 블랙리스트 키(auth:refresh:revoked:{jti}) 누락
             - 검증 통과 콘텐츠만 노출 (APPROVED 상태 외 차단)
             - validation_reference_jobs(IVP PDF 등) 사용자/일반 관리자 노출 절대 금지

          5. **Spring Boot 3.3.x + Jakarta 호환성 + 트랜잭션**:
             - javax.* import 금지, jakarta.* 사용
             - deprecated API 사용 금지
             - @Transactional 누락 또는 범위 오류, readOnly=true 활용
             - 인프로세스 이벤트는 @TransactionalEventListener(phase = AFTER_COMMIT)
             - 이벤트 표준 명명: UserActivityTrackedEvent, AiContentGeneratedEvent, EditorRejectedEvent, JournalCreated/Updated/DeletedEvent, NotificationRequestedEvent

          6. **Modular Monolith 도메인 경계**:
             - 다른 com.qtai.domain.* 의 Entity/Service/Repository 직접 import 금지
             - DTO/Port만 허용 (api/ 패키지의 @NamedInterface 사용)
             - Spring Modulith 1.2+ / ArchUnit 1.3+ 위반 패턴 점검
             - 도메인 공유 DTO 만들지 않음 — 필요시 소유 도메인 Service 호출

          7. **금지 기술/데이터/기능 패턴** (자동 차단 대상):
             - SSE: /ai/sessions/, SseEmitter, text/event-stream, Flux<ServerSentEvent
             - 검색·임베딩: RAG, ChromaDB, Weaviate, Elasticsearch, VectorStore, EmbeddingStore, LangChain4j
             - 인프라(주의): Kafka·Kubernetes·Helm은 v2 MSA 분리 트랙에서 허용(2026-06-08). v1 단일배포 PR에서만 점검.
             - 성경 번역본: 개역개정, ESV, NIV
             - 본문 텍스트: 성서 유니온/두란노 원문 저장 (범위 정보만)
             - 교회 인증 F-11: 화면/버튼/API/DB 필드 추가
             - 찬양: AI 추천, 가사·음원 저장, 직접 YouTube URL 입력
             - PostgreSQL: jdbc:postgresql, ZooKeeper
             - LLM SDK: com.anthropic, Anthropic, ClaudeStreamService (DeepSeek API만 허용)

          8. **도메인 로직 정합성 + 핵심 7정책**:
             - 시간 정책: 성서 유니온 00:00 KST 공개 / 시스템 04:00 KST 수집 배치
             - Today QT 캐시 4상태: HIT/MISS/STALE_FALLBACK/EMPTY
             - F-15 단발 Q&A: POST 202 Accepted + GET polling, 5초 SLA, BLOCKED 시 blocked_reason
             - 시뮬레이터 4상태: READY/MISSING/FAILED/DISABLED — READY만 보기 버튼 활성
             - 검증 통과 콘텐츠만 노출: ai_generated_assets.APPROVED, verse_explanations.APPROVED, simulator_clips.APPROVED
             - 묵상 1일 1건 멱등 정책: notes.active_unique_key='ACTIVE' + 삭제 시 NULL 처리
             - API envelope: success, data, error{code,message,fields}, timestamp, traceId
             - 페이징 표준: content/page/size/totalElements/totalPages/first/last/sort
             - 핵심 7정책: 로그인 강제 / 자동저장 금지 / 기본 비공개 / 공유 스냅샷 / AI 단발성 / 검증 통과만 노출 / 검증 참조 원문 보호

          9. **문서·표현 정합성**:
             - 금지 표현: '저작권 문제 없음', '유실률 0% 보장', '내부 API 경로'
             - 사용자 노출 용어: '주석' 금지 → '해설'(explanation) 사용
             - 한국어 PR 본문 / 코드 주석 / 커밋 메시지 (Conventional Commits)
             - PR 본문에 workspaces/{담당자}/workflows/{date}_{task}.md + reports/{date}_{task}_report.md 경로 링크 필수

          ## 리뷰 작성 규칙
          - 각 기준별로 발견 사항을 정리하세요.
          - 발견 사항이 없으면 '해당 없음'으로 표기.
          - 심각도 표시: [BLOCK] 머지 차단 수준 / [WARN] 권장 / [INFO] 참고
          - **마지막 줄에 다른 텍스트 없이 다음 중 하나만 출력**하세요:
          APPROVE
          REQUEST_CHANGES

          ## PR Diff
          PROMPT_HEADER_EOF

          # ---------------------------------------------------------------
          # 3) diff 본문을 프롬프트 파일에 append (절단 없음)
          # ---------------------------------------------------------------
          cat "$DIFF_FILE" >> "$PROMPT_FILE"
          PROMPT_SIZE=$(wc -c < "$PROMPT_FILE")
          echo "=== 최종 프롬프트 크기: ${PROMPT_SIZE} bytes ==="

          # ---------------------------------------------------------------
          # 4) Claude CLI 호출 — stdin 파이프로 ARG_MAX 우회
          # ---------------------------------------------------------------
          echo "=== Claude Code CLI 실행 중 ==="
          REVIEW=$(claude --print < "$PROMPT_FILE" 2>&1)
          EXIT_CODE=$?
          echo "=== exit code: $EXIT_CODE ==="
          echo "=== review output ==="
          echo "$REVIEW"

          # ---------------------------------------------------------------
          # 5) 리뷰 결과를 다음 step으로 전달
          #    리뷰 출력은 통상 수 KB 수준이므로 GITHUB_OUTPUT(1MB) 한도 내.
          # ---------------------------------------------------------------
          {
            echo 'output<<__OUTPUT_EOF__'
            echo "$REVIEW"
            echo '__OUTPUT_EOF__'
          } >> $GITHUB_OUTPUT

          # ---------------------------------------------------------------
          # 6) Claude CLI 실패 여부와 무관하게 step은 항상 성공으로 종료.
          #    봇 리뷰는 ci-all 필수 게이트에 포함되지 않음.
          # ---------------------------------------------------------------
          exit 0

      # -----------------------------------------------------------------------
      # 리뷰 결과 PR에 등록 + APPROVE 시 CI 완료 확인 후 squash merge → dev
      # -----------------------------------------------------------------------
      - name: Post Review & Auto Merge
        if: always()
        uses: actions/github-script@v9
        env:
          REVIEW_OUTPUT: ${{ steps.claude_review.outputs.output }}
          CLAUDE_STEP_OUTCOME: ${{ steps.claude_review.outcome }}
        with:
          script: |
            const reviewText = process.env.REVIEW_OUTPUT || '';
            const stepOutcome = process.env.CLAUDE_STEP_OUTCOME || '';
            const repoInfo = { owner: context.repo.owner, repo: context.repo.repo };
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // -----------------------------------------------------------------
            // 실패 케이스: Claude CLI가 크래시했거나 빈 출력을 반환한 경우.
            // 조용히 return하지 않고 PR에 진단 코멘트를 남겨야 작성자가 인지 가능.
            // (예: ARG_MAX/E2BIG, OAuth 토큰 누락, 컨텍스트 초과, API 장애 등)
            // -----------------------------------------------------------------
            if (stepOutcome === 'failure' || !reviewText) {
              console.log(`Claude 리뷰 실패 — outcome=${stepOutcome}, output 길이=${reviewText.length}`);

              await github.rest.issues.createComment({
                ...repoInfo,
                issue_number: prNumber,
                body: [
                  '## ⚠️ Claude 자동 리뷰 실행 실패',
                  '',
                  '워크플로우는 트리거됐으나 Claude CLI가 리뷰를 생성하지 못했습니다.',
                  '**자동 머지가 진행되지 않으며, 수동 리뷰가 필요합니다.**',
                  '',
                  `🔗 워크플로우 실행 로그: ${runUrl}`,
                  '',
                  '### 일반적인 원인',
                  '- PR diff가 Claude 컨텍스트 한도(약 200K 토큰)를 초과 → PR을 도메인별로 분할',
                  '- `CLAUDE_CODE_OAUTH_TOKEN` 시크릿 미설정/만료 → 저장소 Settings → Secrets 확인',
                  '- Anthropic API 일시 장애 → status.anthropic.com 확인 후 Re-run jobs',
                  '- Claude CLI 설치 실패 또는 모델명 오류 → 워크플로우 로그의 "Install Claude Code CLI" 단계 확인',
                  '',
                  '### 다음 액션',
                  '1. 위 로그 링크에서 실패 step의 상세 메시지를 확인하세요.',
                  '2. 원인 해결 후 Actions 탭에서 **Re-run jobs** 버튼으로 재시도하거나, 빈 커밋을 push해 워크플로우를 재트리거하세요.',
                  '',
                  '> 이 코멘트는 봇이 자동 생성했습니다.',
                ].join('\n')
              });
              return;
            }

            const lines = reviewText.trim().split('\n');
            const lastLine = lines[lines.length - 1].trim();
            const isApproved = lastLine === 'APPROVE';
            // REQUEST_CHANGES 는 사용하지 않는다.
            // 봇이 머지를 차단하지 않도록 COMMENT 전용으로 고정하고,
            // APPROVE 판정일 때만 자동 squash merge 를 진행한다.
            const reviewEvent = isApproved ? 'APPROVE' : 'COMMENT';

            console.log('=== Claude 리뷰 결과 ===');
            console.log(reviewText);
            console.log('판정:', isApproved ? 'APPROVE → 자동 머지 대기' : 'REQUEST_CHANGES → COMMENT 로 전환 (머지 차단 안 함)');

            await github.rest.pulls.createReview({
              ...repoInfo,
              pull_number: prNumber,
              body: `## 🤖 Claude 자동 코드 리뷰 (v3.1 기준 9개 항목)\n\n${reviewText}`,
              event: reviewEvent
            });

            if (!isApproved) {
              console.log('개선 권장 사항 있음 — 코멘트만 남기고 머지 차단하지 않음');
              return;
            }

            const MAX_WAIT_MS   = 10 * 60 * 1000;
            const POLL_INTERVAL = 15 * 1000;
            const THIS_JOB_NAME = 'claude-review';
            const sha = context.payload.pull_request.head.sha;
            const startTime = Date.now();

            while (Date.now() - startTime < MAX_WAIT_MS) {
              const { data: { check_runs } } = await github.rest.checks.listForRef({
                ...repoInfo,
                ref: sha,
              });

              const ciChecks = check_runs.filter(r => r.name !== THIS_JOB_NAME);

              if (ciChecks.length === 0) {
                await new Promise(r => setTimeout(r, POLL_INTERVAL));
                continue;
              }

              const pending = ciChecks.filter(r => r.status !== 'completed');
              if (pending.length > 0) {
                console.log(`CI 완료 대기 중: ${pending.map(r => r.name).join(', ')}`);
                await new Promise(r => setTimeout(r, POLL_INTERVAL));
                continue;
              }

              const failed = ciChecks.filter(r => r.conclusion !== 'success');
              if (failed.length > 0) {
                const failList = failed.map(r => `\`${r.name}\` (${r.conclusion})`).join(', ');
                await github.rest.issues.createComment({
                  ...repoInfo,
                  issue_number: prNumber,
                  body: [
                    '## ⛔ 자동 머지 취소',
                    '',
                    'Claude 리뷰는 **APPROVE**이나, 아래 CI 체크가 실패하여 머지하지 않습니다.',
                    '',
                    `**실패 항목:** ${failList}`,
                    '',
                    '오류를 수정한 뒤 다시 push해주세요.',
                  ].join('\n')
                });
                return;
              }

              console.log('CI 전체 통과 — 자동 squash merge → dev 진행');
              await github.rest.pulls.merge({
                ...repoInfo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log('머지 완료 → dev');
              return;
            }

            await github.rest.issues.createComment({
              ...repoInfo,
              issue_number: prNumber,
              body: [
                '## ⏱️ 자동 머지 타임아웃',
                '',
                'CI 체크가 **10분** 내 완료되지 않아 자동 머지를 건너뜁니다.',
                '직접 CI 결과를 확인한 뒤 머지해주세요.',
              ].join('\n')
            });
