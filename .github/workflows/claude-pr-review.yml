name: Claude PR Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ dev ]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | head -c 10000 > pr_diff.txt

      - name: Claude PR Review
        id: claude_review
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: 10
          prompt: |
            pr_diff.txt 파일을 읽어 시니어 백엔드 개발자로서 한국어로 코드 리뷰를 작성하세요.

            ## 리뷰 기준
            1. 코드 품질: 가독성, 네이밍, 중복 코드
            2. 버그 가능성: NPE, 인덱스 오류, 예외 처리 누락
            3. 보안: 하드코딩된 시크릿, SQL Injection, 권한 검증 누락
            4. Spring Boot 3.x 호환성: deprecated API 사용 여부
            5. 트랜잭션: @Transactional 누락, 범위 오류
            6. MSA 주의사항: Kafka 이벤트 페어, API 호출 타임아웃, 서비스 의존성
            7. 도메인 로직: 성경 묵상 세션 흐름, AI 코칭 턴 처리, 묵상 노트 생성 로직의 정확성

            리뷰 내용을 모두 작성한 뒤, **마지막 줄**에 다른 텍스트 없이 다음 중 하나만 출력하세요:
            APPROVE
            REQUEST_CHANGES

      - name: Post Review & Auto Merge
        if: always()
        uses: actions/github-script@v7
        env:
          CLAUDE_OUTPUT_FILE: ${{ runner.temp }}/claude-execution-output.json
          OUTPUTS_RESULT: ${{ steps.claude_review.outputs.result }}
          OUTPUTS_OUTPUT: ${{ steps.claude_review.outputs.output }}
        with:
          script: |
            const fs = require('fs');

            // ── 진단: JSON 파일 전체 내용 출력 ──────────────────────────
            const outputFile = process.env.CLAUDE_OUTPUT_FILE;
            console.log('▶ JSON 파일 경로:', outputFile);
            console.log('▶ outputs.result:', (process.env.OUTPUTS_RESULT || '').substring(0, 100));
            console.log('▶ outputs.output:', (process.env.OUTPUTS_OUTPUT || '').substring(0, 100));

            let rawFile = '';
            try {
              rawFile = fs.readFileSync(outputFile, 'utf8');
              console.log('▶ 파일 크기(bytes):', rawFile.length);
              console.log('▶ 파일 내용(첫 500자):', rawFile.substring(0, 500));
            } catch(e) {
              console.log('▶ 파일 읽기 실패:', e.message);
            }
            // ────────────────────────────────────────────────────────────

            // 리뷰 텍스트 추출 (여러 소스 시도)
            let reviewText = '';

            // 1순위: JSON 파일의 result / output / text 필드
            if (rawFile) {
              try {
                const data = JSON.parse(rawFile);
                console.log('▶ JSON 키 목록:', Object.keys(data).join(', '));
                reviewText = data.result || data.output || data.text || '';
              } catch(e) {
                console.log('▶ JSON 파싱 실패:', e.message);
              }
            }

            // 2순위: action outputs.result
            if (!reviewText) reviewText = process.env.OUTPUTS_RESULT || '';

            // 3순위: action outputs.output
            if (!reviewText) reviewText = process.env.OUTPUTS_OUTPUT || '';

            console.log('▶ 최종 reviewText 길이:', reviewText.length);

            if (!reviewText) {
              console.log('리뷰 출력 없음 — 위 진단 로그를 확인하세요.');
              return;
            }

            // 마지막 줄에서 APPROVE / REQUEST_CHANGES 판별
            const lines = reviewText.trim().split('\n');
            const lastLine = lines[lines.length - 1].trim();
            const decision = lastLine === 'APPROVE' ? 'APPROVE' : 'REQUEST_CHANGES';
            console.log('▶ 판정:', decision);

            const repoInfo = { owner: context.repo.owner, repo: context.repo.repo };
            const prNumber = context.payload.pull_request.number;

            await github.rest.pulls.createReview({
              ...repoInfo,
              pull_number: prNumber,
              body: `## 🤖 Claude 자동 코드 리뷰\n\n${reviewText}`,
              event: decision
            });
            console.log('▶ 리뷰 등록 완료:', decision);

            if (decision !== 'APPROVE') return;

            // APPROVE → CI 폴링 후 squash merge
            const MAX_WAIT_MS   = 10 * 60 * 1000;
            const POLL_INTERVAL = 15 * 1000;
            const THIS_JOB_NAME = 'claude-review';
            const sha = context.payload.pull_request.head.sha;
            const startTime = Date.now();

            while (Date.now() - startTime < MAX_WAIT_MS) {
              const { data: { check_runs } } = await github.rest.checks.listForRef({
                ...repoInfo, ref: sha,
              });
              const ciChecks = check_runs.filter(r => r.name !== THIS_JOB_NAME);
              console.log('CI 체크:', ciChecks.map(r => `${r.name}(${r.conclusion || r.status})`).join(', ') || '없음');

              if (ciChecks.length === 0) {
                await new Promise(r => setTimeout(r, POLL_INTERVAL)); continue;
              }
              if (ciChecks.some(r => r.status !== 'completed')) {
                await new Promise(r => setTimeout(r, POLL_INTERVAL)); continue;
              }
              const failed = ciChecks.filter(r => r.conclusion !== 'success');
              if (failed.length > 0) {
                await github.rest.issues.createComment({
                  ...repoInfo, issue_number: prNumber,
                  body: `## ⛔ 자동 머지 취소\n\nCI 실패: ${failed.map(r=>`\`${r.name}\``).join(', ')}\n\n수정 후 다시 push해주세요.`
                });
                return;
              }
              await github.rest.pulls.merge({ ...repoInfo, pull_number: prNumber, merge_method: 'squash' });
              console.log('✅ squash merge → dev 완료');
              return;
            }

            await github.rest.issues.createComment({
              ...repoInfo, issue_number: prNumber,
              body: '## ⏱️ 자동 머지 타임아웃\n\nCI 10분 내 미완료 — 직접 확인 후 머지해주세요.'
            });
