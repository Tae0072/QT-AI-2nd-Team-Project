name: QT-AI CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  spring-build:
    name: Spring Boot Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway
          - bff-aggregator
          - auth-service
          - bible-service
          - ai-service
          - journal-service
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew -p services/${{ matrix.service }} build --no-daemon -x test

      - name: Run Tests
        run: ./gradlew -p services/${{ matrix.service }} test --no-daemon

  flutter-test:
    name: Flutter Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
        continue-on-error: true

      - name: Install Flutter dependencies
        run: |
          if [ -f pubspec.yaml ]; then
            flutter pub get
          else
            echo "pubspec.yaml not found, skipping Flutter steps"
          fi

      - name: Run Flutter Tests
        run: |
          if [ -f pubspec.yaml ]; then
            flutter test
          fi

  decisions-guard:
    name: Decisions Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check forbidden patterns
        run: |
          echo "=== Checking forbidden patterns ==="
          FAILED=0

          if grep -r --include="*.yaml" --include="*.yml" --include="*.properties" \
             -l "jdbc:postgresql" . \
             --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.github 2>/dev/null; then
            echo "ERROR: PostgreSQL JDBC URL 발견! MySQL 8.0만 허용 (DECISIONS.md §1)"
            FAILED=1
          fi

          if grep -r --include="*.yaml" --include="*.yml" --include="*.properties" \
             -l "zookeeper.connect" . \
             --exclude-dir=.git --exclude-dir=.github 2>/dev/null; then
            echo "ERROR: ZooKeeper 설정 발견! KRaft만 허용 (DECISIONS.md §3)"
            FAILED=1
          fi

          if find services/ai-service -name "*.py" -o -name "requirements.txt" 2>/dev/null | grep -q .; then
            echo "ERROR: ai-service에 Python 파일 발견! Spring Boot 전담 (DECISIONS.md §6)"
            FAILED=1
          fi

          if [ -f .env ]; then
            echo "ERROR: .env 파일이 커밋되었습니다!"
            FAILED=1
          fi

          if [ $FAILED -eq 0 ]; then
            echo "All checks passed!"
          else
            exit 1
          fi
