name: QT-AI CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  # =============================================================================
  # 단일 qtai-server Modular Monolith 빌드 + 테스트 + 커버리지
  # =============================================================================
  spring-build:
    name: qtai-server Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qtai-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          fi
        continue-on-error: true

      - name: Build with Gradle
        run: |
          if [ -f gradlew ]; then
            ./gradlew build --no-daemon -x test
          else
            echo "qtai-server gradlew not yet scaffolded — skipping (메모리 24 3번 PR 이전 단계)"
          fi

      - name: Run Tests
        run: |
          if [ -f gradlew ]; then
            ./gradlew test --no-daemon
          fi

      - name: JaCoCo Coverage Report
        run: |
          if [ -f gradlew ]; then
            ./gradlew jacocoTestReport --no-daemon
          fi
        continue-on-error: true

  # =============================================================================
  # Flutter 정적 분석 + 테스트 (analyze + test 둘 다)
  # =============================================================================
  flutter-test:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
        continue-on-error: true

      - name: Install Flutter dependencies
        run: |
          if [ -f pubspec.yaml ]; then
            flutter pub get
          else
            echo "pubspec.yaml not found — Flutter scaffold 이전 단계"
          fi

      - name: Flutter Analyze
        run: |
          if [ -f pubspec.yaml ]; then
            flutter analyze
          fi

      - name: Flutter Test
        run: |
          if [ -f pubspec.yaml ]; then
            flutter test
          fi

  # =============================================================================
  # Requirements Guard — v3.1 금지 패턴 자동 차단 (메모리 25 6번 게이트)
  # =============================================================================
  requirements-guard:
    name: Requirements Guard (v3.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check v3.1 forbidden patterns
        run: |
          echo "=== v3.1 금지 패턴 검사 시작 ==="
          FAILED=0

          # 1) PostgreSQL 금지 (메모리 5: MySQL 8.0만)
          if grep -r --include="*.yaml" --include="*.yml" --include="*.properties" --include="*.java" --include="*.kt" \
             -l "jdbc:postgresql" . \
             --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.github 2>/dev/null; then
            echo "[BLOCK] PostgreSQL JDBC URL 발견 — MySQL 8.0만 허용 (v3.1)"
            FAILED=1
          fi

          # 2) ZooKeeper 금지
          if grep -r --include="*.yaml" --include="*.yml" --include="*.properties" \
             -l "zookeeper.connect" . \
             --exclude-dir=.git --exclude-dir=.github 2>/dev/null; then
            echo "[BLOCK] ZooKeeper 설정 발견 (v3.1)"
            FAILED=1
          fi

          # 3) SSE / 세션형 AI 금지 (메모리 17)
          if [ -d qtai-server ] && grep -rE --include="*.java" --include="*.kt" \
             "SseEmitter|text/event-stream|Flux<ServerSentEvent|/ai/sessions/" qtai-server/ 2>/dev/null; then
            echo "[BLOCK] SSE / 세션형 AI 패턴 발견 — v3.1은 SSE 자체 금지. F-15 단발 Q&A만 허용 (202 + polling)"
            FAILED=1
          fi

          # 4) RAG / Vector DB / Elasticsearch 금지 (메모리 17)
          if [ -d qtai-server ] && grep -rE --include="*.java" --include="*.kt" --include="*.gradle*" --include="*.yaml" \
             "ChromaDB|chromadb|Weaviate|io\\.weaviate|org\\.elasticsearch|VectorStore|EmbeddingStore|langchain4j.*embedding" qtai-server/ 2>/dev/null; then
            echo "[BLOCK] RAG / Vector DB / Elasticsearch 패턴 발견 — MySQL 인덱스만 허용 (v3.1)"
            FAILED=1
          fi

          # 5) Kafka 금지 (메모리 17, ApplicationEventPublisher만 허용)
          if [ -d qtai-server ] && grep -rE --include="*.java" --include="*.kt" --include="*.gradle*" \
             "KafkaTemplate|spring-kafka|@KafkaListener|org\\.apache\\.kafka" qtai-server/ 2>/dev/null; then
            echo "[BLOCK] Kafka 패턴 발견 — Spring ApplicationEventPublisher만 허용 (v3.1)"
            FAILED=1
          fi

          # 6) Kubernetes / Helm 금지 (메모리 17)
          if [ -d k8s ] || [ -d helm ] || find . -name "Chart.yaml" -not -path "*/\.*" 2>/dev/null | grep -q .; then
            echo "[BLOCK] Kubernetes / Helm 디렉터리 발견 — v1은 Docker Compose만 (v3.1)"
            FAILED=1
          fi

          # 7) 성경 번역본 금지 (메모리 18: 개역개정/ESV/NIV)
          # 한국어 "개역개정" + 단어 경계 ESV/NIV. 문서/주석에서 "금지" 라인은 화이트리스트.
          if grep -rEn --include="*.java" --include="*.kt" --include="*.json" --include="*.yaml" --include="*.sql" --include="*.dart" \
             "개역개정|\\bESV\\b|\\bNIV\\b" qtai-server/ flutter-app/ data/ 2>/dev/null | grep -vE "금지|forbidden|prohibit|exclude|blocklist|개역한글|KRV|KJV" | grep -q .; then
            echo "[BLOCK] 금지 성경 번역본(개역개정/ESV/NIV) 발견 — v3.1"
            FAILED=1
          fi

          # 8) 교회 인증 F-11 금지 (메모리 18)
          if grep -rEi --include="*.java" --include="*.kt" --include="*.dart" --include="*.sql" \
             "church_auth|churchVerification|church_cert" qtai-server/ flutter-app/ 2>/dev/null | grep -vE "금지|forbidden|exclude" | grep -q .; then
            echo "[BLOCK] 교회 인증 F-11 패턴 발견 — MVP 완전 제외 (v3.1)"
            FAILED=1
          fi

          # 9) AI 찬양 추천 / 가사·음원 저장 금지 (메모리 18)
          if grep -rEi --include="*.java" --include="*.kt" --include="*.dart" --include="*.sql" \
             "recommend.*song|song.*recommend|lyrics_text|audio_file_uri|audio_url" qtai-server/ flutter-app/ 2>/dev/null | grep -vE "금지|forbidden|exclude" | grep -q .; then
            echo "[BLOCK] AI 찬양 추천 / 가사·음원 저장 패턴 발견 — 운영자 큐레이션만 (v3.1)"
            FAILED=1
          fi

          # 10) Anthropic SDK 금지 — DeepSeek API만 (qtai-server 한정, claude-pr-review.yml 면제)
          if [ -d qtai-server ] && grep -rE --include="*.java" --include="*.kt" --include="*.gradle*" \
             "com\\.anthropic|ClaudeStreamService" qtai-server/ 2>/dev/null; then
            echo "[BLOCK] qtai-server에 Anthropic/Claude 구현 발견 — DeepSeek API만 허용 (v3.1)"
            FAILED=1
          fi

          # 11) javax.* 금지 (메모리 19: jakarta.* 사용, Spring Boot 3.x)
          if [ -d qtai-server ] && grep -rE --include="*.java" --include="*.kt" \
             "^import javax\\.(servlet|persistence|validation|annotation|inject|transaction)" qtai-server/ 2>/dev/null; then
            echo "[BLOCK] javax.* import 발견 — jakarta.* 사용 (v3.1, Spring Boot 3.x)"
            FAILED=1
          fi

          # 12) 금지 표현 (메모리 14) — 코드/문서 모두
          if grep -rE --include="*.md" --include="*.java" --include="*.kt" --include="*.dart" \
             "저작권 문제 없음|유실률 0% 보장|내부 API 경로" . \
             --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.github --exclude-dir=docs 2>/dev/null; then
            echo "[BLOCK] 금지 표현 발견 — 23_도메인_용어사전.md v1.0 갱신 표현 사용"
            FAILED=1
          fi

          # 13) 사용자 노출 "주석" 금지 — "해설" 사용 (메모리 14)
          # Flutter UI 한정, 코드 주석은 OK
          if [ -d flutter-app ] && grep -rE --include="*.dart" \
             "'주석을|\"주석을|'한국어 주석|\"한국어 주석" flutter-app/ 2>/dev/null; then
            echo "[BLOCK] Flutter 사용자 노출 '주석' 발견 — '해설'(explanation) 사용 (v3.1)"
            FAILED=1
          fi

          # 14) 본문 텍스트 저장 금지 (메모리 18: 성서 유니온/두란노 — 범위 정보만)
          if grep -rE --include="*.sql" --include="*.json" \
             "seobi_union_text|sunmoon_text|duranno_text" data/ qtai-server/ 2>/dev/null; then
            echo "[BLOCK] 성서 유니온/두란노 본문 텍스트 저장 발견 — 범위 정보만 (v3.1)"
            FAILED=1
          fi

          # 15) .env 파일 커밋 금지
          if [ -f .env ]; then
            echo "[BLOCK] .env 파일이 커밋되었습니다 — gitleaks도 추후 검출"
            FAILED=1
          fi

          if [ $FAILED -eq 0 ]; then
            echo "=== Requirements Guard v3.1 — All checks passed! ==="
          else
            echo "=== Requirements Guard v3.1 — FAILED ==="
            exit 1
          fi
