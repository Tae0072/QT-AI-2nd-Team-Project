name: qtai_app
description: "큐티 AI 앱"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 네트워크
  dio: ^5.7.0

  # 보안 저장소
  flutter_secure_storage: ^9.2.4

